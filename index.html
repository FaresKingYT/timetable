<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FK | SuperMarket">

  <title>Fares King | Supermarket</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --safe-top:env(safe-area-inset-top);
      --safe-bottom:env(safe-area-inset-bottom);
      --accent:#a855f7;
      --accent-dark:#6b21a8;
      --accent-rgb:168,85,247;
    }
    *{scrollbar-width:none !important;}
    *::-webkit-scrollbar{display:none !important;}
    html,body{overflow:hidden;height:100%;margin:0;}
    body{font-family:"Inter",sans-serif;background:#050505;color:white;-webkit-tap-highlight-color:transparent;}
    #app{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .font-display{font-family:"Archivo Black",sans-serif;letter-spacing:-0.04em;}
    .king-gradient{background:linear-gradient(to right,var(--accent),var(--accent-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    @keyframes wIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    @keyframes wSub{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .w-anim-1{opacity:0;animation:wSub .55s ease .1s forwards;}
    .w-anim-2{opacity:0;animation:wIn  .7s cubic-bezier(.22,1,.36,1) .25s forwards;}
    .w-anim-3{opacity:0;animation:wSub .5s ease .5s forwards;}

    /* ── CARD & IMAGE ── */
    .snack-card{
      cursor:pointer;
      transition:all .4s cubic-bezier(.175,.885,.32,1.275);
      border-color:transparent !important;
      position:relative;
    }
    .snack-card::before{
      content:"";
      position:absolute;inset:-1px;
      border-radius:inherit;
      padding:1.5px;
      background:conic-gradient(from var(--angle,0deg), transparent 0%, #a855f7 25%, #c084fc 50%, transparent 75%);
      -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      opacity:0;
      transition:opacity .3s ease;
      pointer-events:none;
      z-index:1;
    }
    .snack-card.selected::before{opacity:1;animation:borderSpin 1.8s linear infinite;}
    @property --angle{syntax:"<angle>";initial-value:0deg;inherits:false;}
    @keyframes borderSpin{to{--angle:360deg;}}
    .snack-card.selected{background:#0e0e0e;box-shadow:0 0 28px rgba(168,85,247,.18);}

    .snack-shadow{
      filter:drop-shadow(0 20px 40px rgba(168,85,247,.3));
      transition:transform .8s cubic-bezier(.22,1,.36,1), filter .4s;
      object-fit:contain;width:100%;height:100%;pointer-events:none;
    }

    /* Default (non-special) cards: start small, go big on select */
    .snack-shadow:not(.boba-adjust):not(.tiger-milk-pos){
      transform:scale(0.82);
    }
    .snack-card.selected .snack-shadow:not(.boba-adjust):not(.tiger-milk-pos){
      transform:scale(1.12) translateY(-10px);
      filter:drop-shadow(0 24px 48px rgba(168,85,247,.5));
    }

    /* ── BOBA ── */
   .boba-adjust{
      transform:scale(1.8) translate(0px,20px);
    }
    .snack-card.selected .boba-adjust{
      transform:scale(1.95) translate(0px,20px);
      filter:drop-shadow(0 24px 48px rgba(168,85,247,.5));
    }
    .tiger-milk-pos{
      transform:scale(1.8) translate(55px,20px);
    }
    .snack-card.selected .tiger-milk-pos{
      transform:scale(1.95) translate(58px,20px);
      filter:drop-shadow(0 24px 48px rgba(168,85,247,.5));
    }

    .image-container{
      height:480px;display:flex;align-items:center;justify-content:center;
      padding:1rem;position:relative;overflow:hidden;
      background:radial-gradient(circle at center,rgba(168,85,247,.05) 0%,transparent 70%);
    }

    /* ── CART ── */
    .cart-sidebar{transition:transform .5s cubic-bezier(.32,.72,0,1);transform:translateX(100%);}
    .cart-sidebar.open{transform:translateX(0);}

    /* ── SHINE ── */
    @keyframes shine-sweep{0%{transform:translateX(-200%) skewX(-20deg)}100%{transform:translateX(300%) skewX(-20deg)}}
    .shiny-wrap{position:relative;overflow:hidden;border-radius:9999px;}
    .shiny-wrap::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);animation:shine-sweep 2.4s linear infinite;border-radius:9999px;pointer-events:none;}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(120px);background:#a855f7;color:white;padding:1rem 2.5rem;border-radius:2rem;font-weight:900;text-transform:uppercase;font-style:italic;transition:all .4s;z-index:9000;box-shadow:0 15px 40px rgba(168,85,247,.5);opacity:0;pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .tap-active:active{transform:scale(.96);}
    .tab-btn{position:relative;}
    .tab-btn.active::after{content:"";position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:#a855f7;border-radius:2px;}

    /* ── BOTTOM NAV ── */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;z-index:100;
      background:rgba(5,5,5,0.25);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-top:1px solid rgba(255,255,255,0.04);
      padding-bottom:var(--safe-bottom);
    }

    /* ── LOADER ── */
    #loader{position:fixed;inset:0;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;overflow-y:auto;}
    #loader.fade-out{animation:loaderExit .6s ease forwards;}
    @keyframes loaderExit{0%{opacity:1}100%{opacity:0;visibility:hidden}}
    #logo-spin-wrap{position:relative;width:110px;height:110px;display:flex;align-items:center;justify-content:center;}
    #logo-halo{position:absolute;inset:-30px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.25) 0%,transparent 70%);animation:haloPulse 1.8s ease-in-out infinite;}
    @keyframes haloPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
    #logo-ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid transparent;border-top-color:#a855f7;border-right-color:rgba(168,85,247,.3);animation:ringRotate 1s linear infinite;}
    #logo-ring2{position:absolute;inset:-13px;border-radius:50%;border:1px solid transparent;border-bottom-color:rgba(168,85,247,.2);animation:ringRotate 1.7s linear infinite reverse;}
    @keyframes ringRotate{to{transform:rotate(360deg)}}
    #logo-img{width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid rgba(168,85,247,.6);position:relative;z-index:2;animation:logoSpin 1.4s cubic-bezier(.22,1,.36,1) infinite;box-shadow:0 0 30px rgba(168,85,247,.35);}
    @keyframes logoSpin{
      0%  {transform:rotateY(0deg)   scale(1);    filter:brightness(1)   drop-shadow(0 0 12px rgba(168,85,247,.6));}
      25% {transform:rotateY(90deg)  scale(0.82); filter:brightness(0.5) drop-shadow(0 0 4px rgba(168,85,247,.1));}
      50% {transform:rotateY(180deg) scale(1);    filter:brightness(1)   drop-shadow(0 0 12px rgba(168,85,247,.6));}
      75% {transform:rotateY(270deg) scale(0.82); filter:brightness(0.5) drop-shadow(0 0 4px rgba(168,85,247,.1));}
      100%{transform:rotateY(360deg) scale(1);    filter:brightness(1)   drop-shadow(0 0 12px rgba(168,85,247,.6));}
    }
    #logo-img-fb{display:none;width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#6b21a8,#3b0764);align-items:center;justify-content:center;font-family:"Archivo Black",sans-serif;font-size:2.5rem;color:white;border:2px solid rgba(168,85,247,.6);animation:logoSpin 1.4s cubic-bezier(.22,1,.36,1) infinite;box-shadow:0 0 30px rgba(168,85,247,.35);}
    #prog-bar{width:120px;height:2px;background:rgba(168,85,247,.12);border-radius:2px;overflow:hidden;margin-top:28px;}
    #prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#a855f7,#c084fc);border-radius:2px;transition:width .25s ease;}
    #loader-label{margin-top:14px;font-weight:900;letter-spacing:.55em;font-size:10px;text-transform:uppercase;color:rgba(168,85,247,.6);font-style:italic;animation:labelPulse 1.4s ease-in-out infinite;}
    @keyframes labelPulse{0%,100%{opacity:.3}50%{opacity:1}}
    #loader-skip-btn{margin-top:18px;background:none;border:1px solid rgba(168,85,247,.3);color:rgba(168,85,247,.7);padding:8px 20px;border-radius:100px;font-size:11px;font-weight:800;letter-spacing:.08em;cursor:pointer;font-family:Inter,sans-serif;display:none;text-transform:uppercase;}
    #loader-skip-btn:active{transform:scale(.95);}
    #app{display:none;}
    #app.entering{animation:appEnter .6s cubic-bezier(.22,1,.36,1) forwards;}
    @keyframes appEnter{from{opacity:0}to{opacity:1}}
    @keyframes waPulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.4),0 0 0 0 rgba(37,211,102,0)}50%{box-shadow:0 4px 20px rgba(37,211,102,.4),0 0 0 13px rgba(37,211,102,0)}}
    /* SITE DOWN */
    #site-down-overlay{position:fixed;inset:0;background:#050505;z-index:8888;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
    @keyframes sdPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
    /* GOOGLE BTN */
    .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:280px;padding:14px 20px;background:white;color:#1f1f1f;border:none;border-radius:14px;font-family:"Inter",sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:all .2s ease;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
    .google-btn:active{transform:scale(.97);}
  </style>
</head>

window.FK_DB = {
  async saveOrder(data){
    const ref = await addDoc(collection(db,"orders"),{...data,created:serverTimestamp(),status:"pending"});
    return ref.id;
  },
  async getOrder(id){
    const snap = await getDoc(doc(db,"orders",id));
    return snap.exists()?{id:snap.id,...snap.data()}:null;
  },
  async getAllOrders(){
    const q = query(collection(db,"orders"),orderBy("created","desc"));
    const snap = await getDocs(q);
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  },
  async markComplete(id){ await updateDoc(doc(db,"orders",id),{status:"complete"}); },
  async updateOrderStatus(id,status){ await updateDoc(doc(db,"orders",id),{status}); },
  async deleteOrder(id){ await deleteDoc(doc(db,"orders",id)); },
  async getSettings(){
    try{ const snap=await getDoc(doc(db,"config","settings")); return snap.exists()?snap.data():{} }
    catch(e){ return {}; }
  },
  async saveSettings(data){ await setDoc(doc(db,"config","settings"),data,{merge:true}); },
  async getProducts(){
    try{ const snap=await getDoc(doc(db,"config","products")); return snap.exists()?snap.data().list:null; }
    catch(e){ return null; }
  },
  async saveProducts(list){ await setDoc(doc(db,"config","products"),{list}); },
  async saveUserInfo(hwid,info){ await setDoc(doc(db,"users",hwid),info,{merge:true}); },
  async getAllUsers(){
    try{ const snap=await getDocs(collection(db,"users")); return snap.docs.map(d=>({hwid:d.id,...d.data()})); }
    catch(e){ return []; }
  },
  async banUser(hwid,reason,durationHours){
    const until=durationHours===0?0:Date.now()+durationHours*60*60*1000;
    await setDoc(doc(db,"bans",hwid),{reason,until,bannedAt:Date.now()},{merge:true});
  },
  async unbanUser(hwid){ await deleteDoc(doc(db,"bans",hwid)); },
  async checkBan(hwid){
    try{
      const snap=await getDoc(doc(db,"bans",hwid));
      if(!snap.exists()) return null;
      const ban=snap.data();
      if(ban.until!==0&&Date.now()>ban.until){ await deleteDoc(doc(db,"bans",hwid)); return null; }
      return ban;
    }catch(e){ return null; }
  },
  async getAllBans(){
    try{ const snap=await getDocs(collection(db,"bans")); return snap.docs.map(d=>({hwid:d.id,...d.data()})); }
    catch(e){ return []; }
  }
};

<script>
const drive = id=>`https://drive.google.com/thumbnail?id=${id}&sz=w1000`;
const ICON_HOME = "https://drive.google.com/thumbnail?id=19CwRCKQZsmXTUI0DBZtAN4AaUy1zuxdk&sz=w500";
const LOGO_URL  = "https://drive.google.com/thumbnail?id=1jBkacG_Wj8_o7OcVYp6U1rjVb5iLts6I&sz=w1000";

const DEFAULT_SNACKS = [
  {id:1,name:"Tiger Fresh Milk",   price:20,img:drive("19o__91KB2EsotwLSIr0x63ygLdE0QhfR"),isTiger:true, category:"boba",  desc:"premium fresh milk with tiger sugar stripes and boba"},
  {id:2,name:"Classic Boba Taro",  price:16,img:drive("1xKAx3WvPkZQ8OHNMYWbNnpR2WpPpEsGy"),isBoba:true,  category:"boba",  desc:"Classic creamy taro with chewy boba pearls"},
  {id:3,name:"Flaming Hot Cheetos",price:6, img:drive("1kD2YKFBd8n1vhVJjkP0h4JjqQ63zK0mZ"),               category:"snacks",desc:"spicy crunchy chips"},
  {id:4,name:"Spicy Popcorn",      price:4, img:drive("1BJGzA2GC_xCCeEvhirSg4Y8ht14skr-s"),               category:"snacks",desc:"spicy popcorn"},
  {id:5,name:"Balanced Popcorn",   price:3, img:drive("1I78L6Tv0T_-zTeQ2UUitxl8Dd_Pbm-sO"),               category:"snacks",desc:"popcorn"}
];
const THEMES={
  purple:{bg:"#050505",accent:"#a855f7",accentDark:"#6b21a8",label:"Purple (Default)"},
  blue:  {bg:"#020510",accent:"#3b82f6",accentDark:"#1d4ed8",label:"Midnight Blue"},
  green: {bg:"#020805",accent:"#22c55e",accentDark:"#15803d",label:"Neon Green"},
  red:   {bg:"#080203",accent:"#ef4444",accentDark:"#b91c1c",label:"Crimson"},
  gold:  {bg:"#080600",accent:"#f59e0b",accentDark:"#b45309",label:"Gold"},
};

let SNACKS       = DEFAULT_SNACKS.slice();
let currentTheme = localStorage.getItem("fk_theme")||"purple";
let cart         = JSON.parse(localStorage.getItem("fk_cart")||"[]");
let selectedSnack=null, currentFilter="all";
let adminOrders  =[], _adminUser=null, _pendingOrder=null;
let GROUP_LINK   ="https://chat.whatsapp.com/H0lRM4emjMO4sVlsjyGGlq";
let YT           ="https://youtube.com/@faresking";
let tapCount=0, tapTimer=null;
let _loaderDone  = false;

function getOrCreateHWID(){
  let h=localStorage.getItem("fk_hwid");
  if(!h){ h="hwid_"+Math.random().toString(36).substr(2,16)+"_"+Date.now().toString(36); localStorage.setItem("fk_hwid",h); }
  return h;
}

function applyTheme(key,saveGlobal=false){
  const t=THEMES[key]||THEMES.purple;
  document.body.style.background=t.bg;
  const root=document.documentElement;
  root.style.setProperty("--accent",t.accent);
  root.style.setProperty("--accent-dark",t.accentDark);
  const hex=t.accent.replace("#","");
  const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  root.style.setProperty("--accent-rgb",r+","+g+","+b);
  currentTheme=key; localStorage.setItem("fk_theme",key);
  if(saveGlobal&&window.FK_DB) window.FK_DB.saveSettings({globalTheme:key}).catch(()=>{});
}
applyTheme(currentTheme);

let _skipAllowed = false;
let _skipTimer   = null;

function preloadImages(urls){
  return new Promise(resolveAll => {
    let loaded = 0;
    const total = urls.length;
    if(total === 0){ resolveAll(); return; }

    const fill   = document.getElementById("prog-fill");
    const label  = document.getElementById("loader-label");

    function onOne(){
      loaded++;
      const pct = Math.round((loaded / total) * 100);
      if(fill) fill.style.width = pct + "%";
      if(loaded >= total) resolveAll();
    }

    urls.forEach(url=>{
      const img = new Image();
      img.onload  = onOne;
      img.onerror = onOne;
      img.src = url;
    });
  });
}

function skipLoading(){
  if(!_skipAllowed) return;
  clearTimeout(_skipTimer);
  _loaderDone = true;
  hideLoader();
  setTimeout(()=>{ revealApp(); bootApp(); }, 100);
}

function showLoader(){
  const l=document.getElementById("loader");
  if(l){ l.style.display="flex"; l.classList.remove("fade-out"); }
}
function hideLoader(){
  const loader=document.getElementById("loader");
  if(!loader)return;
  loader.classList.add("fade-out");
  setTimeout(()=>{ loader.style.display="none"; },600);
}
function revealApp(){
  const app=document.getElementById("app");
  if(app){ app.style.display="block"; app.classList.add("entering"); }
}

function runLoaderWithImages(cb){
  const label   = document.getElementById("loader-label");
  const skipBtn = document.getElementById("loader-skip-btn");
  showLoader();

  const imgUrls = [LOGO_URL, ...DEFAULT_SNACKS.map(s=>s.img)];

  _skipTimer = setTimeout(()=>{
    _skipAllowed = true;
    if(label)   label.textContent = "Taking long time...";
    if(skipBtn) skipBtn.style.display = "block";
  }, 30000);

  preloadImages(imgUrls).then(()=>{
    clearTimeout(_skipTimer);
    setTimeout(()=>{
      hideLoader();
      setTimeout(cb, 100);
    }, 350);
  });
}

/* ── PWA / INSTALL DETECTION ── */
(function(){
  const isStandalone =
    window.navigator.standalone === true ||
    window.matchMedia("(display-mode:standalone)").matches ||
    window.matchMedia("(display-mode:fullscreen)").matches;

  const wasInstalled = !!localStorage.getItem("fk_was_installed");

  if(isStandalone || wasInstalled){
    if(isStandalone) localStorage.setItem("fk_was_installed","1");
    runLoaderWithImages(()=>{ revealApp(); bootApp(); });
  } else {
    const dismissed = localStorage.getItem("fk_install_dismissed");
    if(!dismissed){
      document.getElementById("loader").style.display = "none";
      showInstallGuide();
    } else {
      runLoaderWithImages(()=>{ revealApp(); bootApp(); });
    }

/* ── BOOT ── */
async function bootApp(){
  if(!window.FK_DB && !window._fkReady){
    await new Promise(r=>{
      const t=setTimeout(r,5000);
      window.addEventListener("fk-ready",()=>{clearTimeout(t);r();},{once:true});
    });
  }
  if(!window.FK_DB){ await new Promise(r=>setTimeout(r,500)); }

  try{
    if(window.FK_DB){
      const settings=await window.FK_DB.getSettings();
      if(settings.waLink) GROUP_LINK=settings.waLink;
      if(settings.ytLink) YT=settings.ytLink;
      if(settings.globalTheme) applyTheme(settings.globalTheme);
      window._banner=settings.bannerEnabled?{text:settings.bannerText||"",bg:settings.bannerBg||"#ef4444",tc:settings.bannerTextColor||"#ffffff"}:null;
      if(settings.siteDown){
        const msg=settings.siteDownMsg||"The shop is temporarily closed. Check back later.";
        const sdMsg=document.getElementById("site-down-msg");
        if(sdMsg) sdMsg.textContent=msg;
        const sdOverlay=document.getElementById("site-down-overlay");
        if(sdOverlay) sdOverlay.style.display="flex";
        setupTapZone();
        return;
      }
      const remote=await window.FK_DB.getProducts();
      if(remote&&remote.length>0) SNACKS=remote;
      const HWID=getOrCreateHWID();
      const ban=await window.FK_DB.checkBan(HWID);
      if(ban){
        const until=ban.until===0?"Permanent":new Date(ban.until).toLocaleDateString("en-AE");
        const app=document.getElementById("app");
        if(app){
          app.style.display="block";
          app.innerHTML=`<div style="position:fixed;inset:0;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;">
            <div style="width:64px;height:64px;border-radius:18px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
              <i class="fas fa-ban" style="color:#ef4444;font-size:1.6rem;"></i>
            </div>
            <h2 style="font-family:'Archivo Black',sans-serif;font-size:22px;text-transform:uppercase;letter-spacing:-0.03em;margin-bottom:8px;">Access Restricted</h2>
            <p style="font-size:13px;color:rgba(255,255,255,.4);line-height:1.7;max-width:280px;margin-bottom:12px;">${ban.reason||"You have been restricted from this app."}</p>
            <p style="font-size:11px;color:rgba(239,68,68,.6);">Until: ${until}</p>
          </div>`;
        }
        return;
      }
    }
  }catch(e){ console.warn("Settings load failed, using defaults",e); }

  buildApp();
  setupTapZone();
  if(window.FK_AUTH){ window.FK_AUTH.onAuth(user=>{ _adminUser=user; }); }
}

/* ── TAP ZONE ── */
function setupTapZone(){
  const NEEDED=5, WINDOW=2000, COOLDOWN=5*60*1000;
  let lastTrigger=0;
  function attachToTitle(){
    const title=document.querySelector("h1.font-display");
    if(!title)return;
    title.style.userSelect="none";title.style.webkitUserSelect="none";
    function onTap(e){
      e.stopPropagation();
      const now=Date.now();
      if(now-lastTrigger<COOLDOWN)return;
      if(tapCount>0&&now-(window._lastAdminTap||0)>WINDOW) tapCount=0;
      window._lastAdminTap=now; tapCount++;
      if(tapCount>=NEEDED){tapCount=0;lastTrigger=now;openAdminSignin();}
    }
    title.addEventListener("click",onTap);
    title.addEventListener("touchend",onTap,{passive:true});
  }
  attachToTitle();
  setTimeout(attachToTitle,500);
  setTimeout(attachToTitle,1500);
}

function admTab(name){
  const t=THEMES[currentTheme]||THEMES.purple;

/* ORDERS */
async function loadAdminOrders(){
  const c=document.getElementById("adm-content");
  if(c)c.innerHTML=`<div style="text-align:center;padding:60px 20px;"><i class="fas fa-spinner fa-spin" style="color:var(--accent);font-size:1.5rem;"></i></div>`;

  catch(e){if(c)c.innerHTML=`<p style="text-align:center;color:rgba(255,255,255,.25);padding:40px;">Failed to load</p>`;}
}
function renderAdmOrders(c){
  if(!c)return;
  const pend=adminOrders.filter(o=>o.status!=="complete"&&o.status!=="archived").length;
  const rev=adminOrders.filter(o=>o.status==="complete"||o.status==="archived").reduce((s,o)=>s+(o.total||0),0);
  const today=new Date().toLocaleDateString("en-AE");
  const todayRev=adminOrders.filter(o=>(o.status==="complete"||o.status==="archived")&&new Date((o.created?.seconds?o.created.seconds*1000:(o.created||0))).toLocaleDateString("en-AE")===today).reduce((s,o)=>s+(o.total||0),0);
  const doneOrders=adminOrders.filter(o=>o.status==="complete"||o.status==="archived");
  const avgOrder=doneOrders.length?Math.round(rev/doneOrders.length):0;
  const cts={};adminOrders.forEach(o=>(o.items||[]).forEach(i=>{cts[i.name]=(cts[i.name]||0)+i.qty;}));
  const topItem=Object.entries(cts).sort((a,b)=>b[1]-a[1])[0];
  c.innerHTML=`<div style="padding:14px 16px;">
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;">
      <div style="background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.15);border-radius:14px;padding:12px;text-align:center;"><p style="font-family:'Archivo Black',sans-serif;font-size:22px;">${adminOrders.length}</p><p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">TOTAL ORDERS</p></div>
      <div style="background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.15);border-radius:14px;padding:12px;text-align:center;"><p style="font-family:'Archivo Black',sans-serif;font-size:22px;color:#fbbf24;">${pend}</p><p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">PENDING</p></div>
      <div style="background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.15);border-radius:14px;padding:12px;text-align:center;"><p style="font-family:'Archivo Black',sans-serif;font-size:16px;color:#22c55e;">AED ${rev}</p><p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">TOTAL REV</p></div>
      <div style="background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.12);border-radius:14px;padding:12px;text-align:center;"><p style="font-family:'Archivo Black',sans-serif;font-size:15px;color:#22c55e;">AED ${todayRev}</p><p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">TODAY</p></div>
      <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;text-align:center;"><p style="font-family:'Archivo Black',sans-serif;font-size:15px;color:rgba(255,255,255,.7);">AED ${avgOrder}</p><p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">AVG ORDER</p></div>
      <div style="background:rgba(168,85,247,.04);border:1px solid rgba(168,85,247,.1);border-radius:14px;padding:12px;text-align:center;"><p style="font-family:'Archivo Black',sans-serif;font-size:12px;color:rgba(255,255,255,.7);">${topItem?topItem[0]+" ×"+topItem[1]:"—"}</p><p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">TOP ITEM</p></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <input id="adm-search" oninput="filterAdmOrders()" type="text" placeholder="Search..." style="flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 12px;color:white;font-size:12px;outline:none;font-family:Inter,sans-serif;">
      <select id="adm-filter" onchange="filterAdmOrders()" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 10px;color:white;font-size:12px;outline:none;">
        <option value="all">Active</option><option value="pending">Pending</option><option value="complete">Complete</option><option value="archived">Archived</option>
      </select>
      <button onclick="loadAdminOrders()" style="background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);border-radius:10px;padding:9px 12px;color:#a855f7;font-size:12px;cursor:pointer;">↻</button>
    </div>
    <div id="adm-orders-list"></div>
  </div>`;
  filterAdmOrders();
}
function filterAdmOrders(){
  const search=(document.getElementById("adm-search")?.value||"").toLowerCase();
  const filter=document.getElementById("adm-filter")?.value||"all";
  let list=adminOrders.filter(o=>o.status!=="archived");
  if(filter==="archived") list=adminOrders.filter(o=>o.status==="archived");
  else if(filter!=="all") list=list.filter(o=>o.status===filter);
  if(search) list=list.filter(o=>(o.id||"").toLowerCase().includes(search)||(o.customer?.name||"").toLowerCase().includes(search)||(o.customer?.grade||"").toLowerCase().includes(search));
  const el=document.getElementById("adm-orders-list");if(!el)return;
  if(!list.length){el.innerHTML=`<p style="text-align:center;color:rgba(255,255,255,.2);font-size:13px;padding:32px 0;">No orders found</p>`;return;}
  el.innerHTML=list.map(o=>{
    const ts=o.created?.seconds?o.created.seconds*1000:(o.created||Date.now());
    const ds=new Date(ts).toLocaleDateString("en-AE",{day:"2-digit",month:"short"});
    const tm=new Date(ts).toLocaleTimeString("en-AE",{hour:"2-digit",minute:"2-digit"});
    const its=(o.items||[]).map(i=>`${i.name} ×${i.qty}`).join(", ");
    const st=getStatusStyle(o.status||"pending");
    return `<div style="border-radius:16px;border:1px solid ${st.border};background:${st.bg.replace(".1)",".03)")};padding:14px;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div><p style="font-size:10px;font-weight:900;color:#a855f7;letter-spacing:.05em;">#${(o.id||"").substring(0,14)}</p><p style="font-weight:800;font-size:15px;margin-top:2px;">${o.customer?.name||"Unknown"}</p></div>
        <div style="text-align:right;"><span style="font-size:10px;font-weight:900;padding:3px 10px;border-radius:100px;background:${st.bg};color:${st.color};border:1px solid ${st.border};">${st.label.toUpperCase()}</span><p style="font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;">${ds} · ${tm}</p></div>
      </div>
      <p style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:3px;">🎓 ${o.customer?.grade||"—"} &nbsp;·&nbsp; 📅 ${o.customer?.date||"—"}</p>
      <p style="font-size:11px;color:rgba(255,255,255,.25);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:10px;">${its}</p>
      <div id="items-detail-${o.id}" style="display:none;margin-bottom:10px;background:rgba(255,255,255,.03);border-radius:10px;padding:10px;">
        ${(o.items||[]).map(i=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;"><span style="color:rgba(255,255,255,.6);">${i.name} ×${i.qty}</span><span style="font-weight:700;">AED ${i.price*i.qty}</span></div>`).join("")}
        <div style="border-top:1px solid rgba(255,255,255,.06);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-size:13px;font-weight:900;"><span style="color:rgba(255,255,255,.4);">Total</span><span style="color:#a855f7;">AED ${o.total||0}</span></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-weight:900;color:#a855f7;font-size:15px;">AED ${o.total||0}</span>
          <button onclick="(function(){var d=document.getElementById('items-detail-${o.id}');d.style.display=d.style.display==='none'?'block':'none';})()" style="background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:4px 10px;color:rgba(168,85,247,.8);font-size:10px;font-weight:800;cursor:pointer;font-family:Inter,sans-serif;">ITEMS ▾</button>
        </div>
        <div style="display:flex;gap:6px;">
          <button onclick="openStatusPicker('${o.id}','${o.status||"pending"}')" style="background:${st.bg};border:1px solid ${st.border};border-radius:10px;padding:7px 12px;color:${st.color};font-size:11px;font-weight:800;cursor:pointer;font-family:Inter,sans-serif;">Status ▾</button>
          <button onclick="admArchiveOrder('${o.id}')" style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);border-radius:10px;padding:7px 10px;color:#f87171;font-size:11px;cursor:pointer;font-family:Inter,sans-serif;">✓ Done</button>
          <button onclick="admHardDelete('${o.id}')" title="Permanently delete" style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);border-radius:10px;padding:7px 10px;color:#f87171;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;"><i class="fas fa-trash-can"></i></button>
        </div>
      </div>
    </div>`;
  }).join("");
}

const ORDER_STATUSES=[
  {key:"pending",            label:"Pending",               color:"#fbbf24",bg:"rgba(251,191,36,.1)", border:"rgba(251,191,36,.25)"},
  {key:"confirmed",          label:"Order Confirmed",        color:"#60a5fa",bg:"rgba(96,165,250,.1)",border:"rgba(96,165,250,.25)"},
  {key:"getting_product",    label:"Getting Product",        color:"#c084fc",bg:"rgba(192,132,252,.1)",border:"rgba(192,132,252,.25)"},
  {key:"waiting_school_day", label:"Waiting for School Day", color:"#f97316",bg:"rgba(249,115,22,.1)", border:"rgba(249,115,22,.25)"},
  {key:"complete",           label:"Ready for Pickup ✓",     color:"#22c55e",bg:"rgba(34,197,94,.12)", border:"rgba(34,197,94,.3)"},
  {key:"archived",           label:"Archived",               color:"rgba(255,255,255,.3)",bg:"rgba(255,255,255,.04)",border:"rgba(255,255,255,.1)"},
];
function getStatusStyle(key){return ORDER_STATUSES.find(s=>s.key===key)||ORDER_STATUSES[0];}
async function admSetStatus(id,status){
  await window.FK_DB.updateOrderStatus(id,status);
  const o=adminOrders.find(x=>x.id===id);if(o)o.status=status;
  filterAdmOrders();showToast("Status updated!");
  const picker=document.getElementById("status-picker-"+id);if(picker)picker.remove();
}
function openStatusPicker(id,currentStatus){
  document.querySelectorAll(".status-picker-overlay").forEach(x=>x.remove());
  const overlay=document.createElement("div");
  overlay.className="status-picker-overlay";overlay.id="status-picker-"+id;
  overlay.style.cssText="position:fixed;inset:0;z-index:99999;display:flex;align-items:flex-end;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);";
  overlay.innerHTML=`<div style="width:100%;background:#0d0d16;border-top:1px solid rgba(255,255,255,.1);border-radius:24px 24px 0 0;padding:20px;padding-bottom:calc(20px + var(--safe-bottom));">
    <div style="width:36px;height:4px;background:rgba(255,255,255,.1);border-radius:4px;margin:0 auto 16px;"></div>
    <p style="font-family:'Archivo Black',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:-0.02em;margin-bottom:14px;">Update Status</p>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${ORDER_STATUSES.map(s=>`<button onclick="admSetStatus('${id}','${s.key}')" style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:14px;background:${s.key===currentStatus?s.bg:"rgba(255,255,255,.03)"};border:1px solid ${s.key===currentStatus?s.border:"rgba(255,255,255,.07)"};cursor:pointer;font-family:Inter,sans-serif;">
        <span style="font-weight:800;font-size:13px;color:${s.key===currentStatus?s.color:"white"};">${s.label}</span>
        ${s.key===currentStatus?`<span style="font-size:12px;color:${s.color};">✓</span>`:""}
      </button>`).join("")}
    </div>
    <button onclick="document.getElementById('status-picker-${id}').remove()" style="width:100%;margin-top:10px;padding:12px;background:none;border:none;color:rgba(255,255,255,.3);font-size:13px;cursor:pointer;font-family:Inter,sans-serif;">Cancel</button>
  </div>`;
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}
async function admArchiveOrder(id){
  await window.FK_DB.updateOrderStatus(id,"archived");
  adminOrders=adminOrders.filter(x=>x.id!==id);
  filterAdmOrders();renderAdmOrders(document.getElementById("adm-content"));
  showToast("Order archived ✓");
}

async function admHardDelete(id){
  if(!confirm("Permanently delete this order? This cannot be undone and will NOT affect revenue stats."))return;
  try{
    await window.FK_DB.deleteOrder(id);
    adminOrders=adminOrders.filter(x=>x.id!==id);
    filterAdmOrders();
    renderAdmOrders(document.getElementById("adm-content"));
    showToast("Order permanently deleted 🗑️");

      <input id="pm-price" type="number" placeholder="Price (AED)"      value="${s?.price||''}" style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:13px 16px;color:white;font-size:14px;outline:none;box-sizing:border-box;font-family:Inter,sans-serif;">
      <input id="pm-desc"  type="text"   placeholder="Short description" value="${s?.desc||''}"  style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:13px 16px;color:white;font-size:14px;outline:none;box-sizing:border-box;font-family:Inter,sans-serif;">
      <input id="pm-img"   type="text"   placeholder="Google Drive thumbnail URL" value="${s?.img||''}" style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:13px 16px;color:white;font-size:14px;outline:none;box-sizing:border-box;font-family:Inter,sans-serif;">

        <option value="boba" ${s?.category==="boba"?"selected":""}>🧋 Drinks / Boba</option>

        <p style="font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;font-weight:900;margin-bottom:10px;">Sticker / Badge</p>

        <label style="flex:1;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px 14px;cursor:pointer;"><span style="font-size:13px;font-weight:700;">🚫 Out of Stock</span><input id="pm-oos" type="checkbox" ${s?.outOfStock?"checked":""} style="width:18px;height:18px;accent-color:#ef4444;cursor:pointer;"></label>

    <button onclick="saveProductModal()" style="width:100%;margin-top:16px;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:white;border:none;border-radius:14px;font-weight:900;font-size:14px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;font-family:Inter,sans-serif;">Save Product</button>
    <button onclick="document.getElementById('prod-modal').style.display='none'" style="width:100%;margin-top:8px;padding:12px;background:none;border:none;color:rgba(255,255,255,.3);font-size:13px;cursor:pointer;font-family:Inter,sans-serif;">Cancel</button>
  </div>`;
}
async function saveProductModal(){
  const name=document.getElementById("pm-name").value.trim();
  const price=parseFloat(document.getElementById("pm-price").value)||0;
  const desc=document.getElementById("pm-desc").value.trim();
  const img=document.getElementById("pm-img").value.trim();
  const cat=document.getElementById("pm-cat").value;
  const sticker=(document.getElementById("pm-sticker")?.value||"").trim();
  const stickerBg=document.getElementById("pm-sticker-bg")?.value||"#ef4444";
  const stickerColor=document.getElementById("pm-sticker-color")?.value||"#ffffff";
  const featured=!!(document.getElementById("pm-featured")?.checked);
  const outOfStock=!!(document.getElementById("pm-oos")?.checked);
  if(!name||!price||!img){showToast("Fill in all fields");return;}
  if(_editProdId){
    const s=SNACKS.find(x=>x.id===_editProdId);
    if(s){s.name=name;s.price=price;s.desc=desc;s.img=img;s.category=cat;s.sticker=sticker;s.stickerBg=stickerBg;s.stickerColor=stickerColor;s.featured=featured;s.outOfStock=outOfStock;}
  } else {
    SNACKS.push({id:Math.max(0,...SNACKS.map(s=>s.id))+1,name,price,desc,img,category:cat,sticker,stickerBg,stickerColor,featured,outOfStock});
  }
  try{await window.FK_DB.saveProducts(SNACKS);}catch(e){console.warn(e);}
  document.getElementById("prod-modal").style.display="none";
  renderProducts(currentFilter);
  renderAdmProducts(document.getElementById("adm-content"));
  showToast(_editProdId?"Product updated!":"Product added!");
}
async function admDeleteProduct(id){
  if(!confirm("Remove this product?"))return;
  SNACKS=SNACKS.filter(s=>s.id!==id);
  try{await window.FK_DB.saveProducts(SNACKS);}catch(e){}
  renderProducts(currentFilter);
  renderAdmProducts(document.getElementById("adm-content"));
  showToast("Product removed");
}

    </div>

function toggleSD() {
  _siteDown = !_siteDown;
  const toggle = document.getElementById("sd-toggle");
  if (toggle) {
    toggle.style.background = _siteDown ? "#ef4444" : "rgba(255,255,255,.1)";
    toggle.children[0].style.left = _siteDown ? "23px" : "3px";
  }
}
