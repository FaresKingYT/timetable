<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FaresKingYT | Ultimate Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syncopate:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --primary: #a855f7;
            --accent: #d8b4fe;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --card-radius: 40px;
            --bg-gradient: linear-gradient(to bottom, #050505, #0a0a0a);
        }

        /* THEME: OLD UI (ORIGINAL NEON PURPLE) */
        body.theme-old {
            --primary: #9333ea;
            --accent: #c084fc;
            --bg-gradient: linear-gradient(-45deg, #0f0518, #1a0b2e, #0a0a0a, #2e1065);
            --card-radius: 50px;
        }
        body.theme-old .stars-overlay { display: block; }
        body.theme-old .glass-card { 
            background: rgba(147, 51, 234, 0.1);
            backdrop-filter: blur(30px);
            border: 4px solid rgba(147, 51, 234, 0.4);
            box-shadow: 0 0 100px rgba(147, 51, 234, 0.3);
        }

        /* Default Theme Variations */
        body.theme-emerald { --primary: #10b981; --accent: #6ee7b7; }
        body.theme-rose { --primary: #f43f5e; --accent: #fda4af; }
        body.theme-cyan { --primary: #06b6d4; --accent: #67e8f9; }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            font-family: 'Inter', sans-serif; color: white;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientAnim 15s ease infinite;
            overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        canvas#fluid-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .stars-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            opacity: 0.3; pointer-events: none; display: none;
        }

        .premium-header {
            width: 100%; padding: 3rem 1rem 1rem;
            display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: 10;
            perspective: 1000px;
        }

        /* LOGO TILT ANIMATION */
        .logo-img {
            width: 130px; height: 130px; border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.4);
            cursor: pointer; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: logoIntro 1.5s ease-out forwards;
        }

        @keyframes logoIntro {
            0% { transform: rotateY(0deg) scale(0); opacity: 0; }
            50% { transform: rotateY(360deg) scale(1.2); opacity: 1; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        .yt-title {
            font-family: 'Syncopate', sans-serif; font-weight: 700;
            font-size: 2.2rem; letter-spacing: 6px; margin-top: 1rem;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; text-align: center;
        }

        .main-container {
            width: 100%; max-width: 800px; padding: 0 1.5rem 140px;
            position: relative; z-index: 10; margin: 0 auto;
        }

        /* MOVING BORDER CARD */
        .glass-card {
            position: relative;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(30px);
            border-radius: var(--card-radius);
            padding: 3rem 1.5rem; width: 100%;
            text-align: center; transition: 0.5s;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--primary));
            animation: rotateBorder 4s linear infinite;
            z-index: -1;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: rgba(10, 10, 10, 0.9);
            border-radius: calc(var(--card-radius) - 4px);
            z-index: -1;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .class-name {
            font-size: clamp(2.5rem, 10vw, 6rem);
            font-weight: 900; margin: 1rem 0;
            line-height: 1.1;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .time-display { font-family: 'Orbitron'; font-size: 2.5rem; opacity: 0.8; margin-top: 10px; }
        
        #timer-container {
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            color: #fbbf24; font-family: 'Orbitron';
            margin-top: 15px; font-weight: 900;
            line-height: 1.2;
        }

        .join-now-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem; margin-top: 2.5rem;
            font-weight: 900; 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            color: #fff; padding: 15px 40px;
            border-radius: 20px;
            cursor: pointer; display: inline-block;
            transition: 0.3s;
            text-shadow: 0 0 15px var(--primary);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
            animation: pulseJoin 2s infinite;
        }

        @keyframes pulseJoin {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 50px rgba(168, 85, 247, 0.4); }
        }

        .subscribe-btn {
            background: #ff0000; color: white;
            padding: 10px 25px; border-radius: 30px;
            font-family: 'Inter', sans-serif; font-weight: 700;
            font-size: 0.9rem; margin-top: 1.5rem;
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: 0.3s;
            border: none;
        }
        .subscribe-btn:hover { background: #cc0000; transform: scale(1.05); }

        .nav-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; padding: 12px 24px;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 100px;
            z-index: 100;
        }

        .nav-item {
            width: 55px; height: 55px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.4);
        }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 0 25px var(--primary); }

        #settings-panel {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: #000; z-index: 1000; padding: 6rem 2rem;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); overflow-y: auto;
        }
        #settings-panel.open { right: 0; }

        .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .theme-opt { height: 50px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .theme-opt.active { border-color: white; transform: scale(0.9); }

        .bg-mode-btn {
            width: 100%; padding: 18px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 20px;
            margin-bottom: 10px; text-align: left; font-weight: 600;
            transition: 0.3s;
        }
        .bg-mode-btn.active { background: var(--primary); color: #000; border-color: white; box-shadow: 0 0 20px var(--primary); }

        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 0.8s;
        }
    </style>
</head>
<body onmousemove="handleMove(event)" ontouchmove="handleMove(event)">

    <div class="stars-overlay"></div>

    <div id="intro-overlay">
        <div style="font-family: 'Orbitron'; letter-spacing: 10px; font-weight: 900; font-size: 1.8rem; color: var(--primary); text-shadow: 0 0 20px var(--primary);">FARESKINGYT</div>
    </div>

    <header class="premium-header">
        <img src="https://unavatar.io/youtube/FaresKingYT" id="main-logo" alt="Logo" class="logo-img" onclick="window.open('https://youtube.com/@FaresKingYT', '_blank')">

        <button class="subscribe-btn" onclick="window.open('https://youtube.com/@FaresKingYT?sub_confirmation=1', '_blank')">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>

    <main class="main-container">
        <div id="status-tab" class="tab-content block">
            <div class="glass-card" id="card-element">
                <div id="status-label" style="font-family: Orbitron; color: var(--accent); letter-spacing: 5px; font-size: 0.75rem; font-weight: 900; position: relative; z-index: 2;">SYSTEM LIVE</div>
                <div class="class-name" id="current-class" style="position: relative; z-index: 2;">CONNECTING...</div>

            </div>

        <div id="schedule-tab" class="tab-content hidden">

                <div class="flex gap-4 mb-6 overflow-x-auto pb-2 no-scrollbar justify-center relative z-10">
                    <button class="day-tab font-['Orbitron'] text-xs opacity-40" onclick="switchDay('Monday')">MON</button>
                    <button class="day-tab font-['Orbitron'] text-xs opacity-40" onclick="switchDay('Tuesday')">TUE</button>
                    <button class="day-tab font-['Orbitron'] text-xs opacity-40" onclick="switchDay('Wednesday')">WED</button>
                    <button class="day-tab font-['Orbitron'] text-xs opacity-40" onclick="switchDay('Thursday')">THU</button>

    <nav class="nav-dock">
        <div class="nav-item active" onclick="showTab('status-tab', this)">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        </div>
        <div class="nav-item" onclick="showTab('schedule-tab', this)">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>

        <div class="nav-item" onclick="toggleSettings()">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"></path><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>

    <div id="settings-panel">
        <h2 class="font-['Orbitron'] font-bold text-xl mb-10">SYSTEM SETTINGS</h2>
        
        <div class="mb-10">
            <p class="text-[0.6rem] font-['Orbitron'] opacity-50 mb-4 tracking-widest">THEME PRESETS</p>
            <div class="theme-grid">
                <div class="theme-opt" style="background: #a855f7" onclick="setTheme('purple')"></div>
                <div class="theme-opt" style="background: #10b981" onclick="setTheme('emerald')"></div>
                <div class="theme-opt" style="background: #f43f5e" onclick="setTheme('rose')"></div>
                <div class="theme-opt" style="background: #06b6d4" onclick="setTheme('cyan')"></div>
                <div class="theme-opt" style="background: #111; border: 1px solid #9333ea; color:#9333ea" onclick="setTheme('old')">OLD</div>
            </div>
        </div>

        <div>
            <p class="text-[0.6rem] font-['Orbitron'] opacity-50 mb-4 tracking-widest">VISUAL ENGINE</p>
            <button class="bg-mode-btn bg-engine-opt active" id="btn-fluid" onclick="setBGMode('fluid', this)">FLUID NEON</button>
            <button class="bg-mode-btn bg-engine-opt" id="btn-deep" onclick="setBGMode('deep', this)">DEEP SPACE</button>
            <button class="bg-mode-btn bg-engine-opt" id="btn-static" onclick="setBGMode('static', this)">STATIC GLASS</button>
        </div>
        
        <button onclick="toggleSettings()" class="mt-10 w-full py-4 font-bold border border-white/10 rounded-xl">SAVE & CLOSE</button>
    </div>

    <script>
        const canvas = document.getElementById('fluid-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let bgMode = 'fluid';

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() * 2 - 1) * 1.5;
                this.speedY = (Math.random() * 2 - 1) * 1.5;
                this.opacity = 1;
                this.color = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim() || '#a855f7';
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.opacity -= 0.015; }
            draw() { ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }

        function handleMove(e) {
            if(bgMode !== 'fluid') return;
            const x = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
            const y = (e.touches && e.touches[0]) ? e.touches[0].clientY : e.clientY;
            if (x === undefined || y === undefined) return;
            for(let i=0; i<4; i++) particles.push(new Particle(x, y));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if(particles[i].opacity <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        animate();

        window.onload = function() {
            // Re-trigger logo intro animation on load
            const logo = document.getElementById('main-logo');
            logo.style.animation = 'none';
            logo.offsetHeight; // trigger reflow
            logo.style.animation = null;

            setTimeout(() => { document.getElementById('intro-overlay').style.opacity = '0'; setTimeout(() => document.getElementById('intro-overlay').style.display='none', 800); }, 1200);
            
            const savedTheme = localStorage.getItem('fk-theme') || 'purple';
            setTheme(savedTheme);
            
            const savedBG = localStorage.getItem('fk-bg') || 'fluid';
            setBGMode(savedBG, document.getElementById('btn-' + savedBG));
        };

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(id === 'schedule-tab') renderSchedule();
        }

        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }

        function setTheme(color) {
            document.body.className = '';
            if(color !== 'purple') document.body.classList.add('theme-' + color);
            localStorage.setItem('fk-theme', color);
            document.querySelectorAll('.theme-opt').forEach(opt => opt.classList.toggle('active', opt.onclick.toString().includes(`'${color}'`)));
            particles = []; 
        }

        function setBGMode(mode, el) {
            bgMode = mode;
            localStorage.setItem('fk-bg', mode);
            document.querySelectorAll('.bg-engine-opt').forEach(opt => opt.classList.remove('active'));
            if(el) el.classList.add('active');
            else if(document.getElementById('btn-' + mode)) document.getElementById('btn-' + mode).classList.add('active');
        }

        const links = {
            "ENGLISH": "https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fl%2Fmeetup-join%2F19%3Ameeting_OTg0ODZmY2ItNmE4Yy00YzU3LWFiYzMtNDkzYzRhNDliOTlh%40thread.v2%2F0%3Fcontext%3D%257B%2522Tid%2522%253A%2522eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%2522%252C%2522Oid%2522%253A%252283d1881e-52d2-4333-a4a2-c84264d0fb71%2522%257D%26anon%3Dtrue",
            "MATH": "https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fl%2Fmeetup-join%2F19%3Ameeting_ZmQxZDIxZTAtZWI3Ny00MjY1LTg4ZjgtNTU4MjNlYTRhMmVm%40thread.v2%2F0%3Fcontext%3D%257B%2522Tid%2522%253A%2522eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%2522%252C%2522Oid%2522%253A%2522289c9388-c1b1-4c07-896a-2372670634e3%2522%257D%26anon%3Dtrue",
            "SCIENCE": "https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fl%2Fmeetup-join%2F19%3Ameeting_YjBkNWY4YWYtYThiMi00YjQ4LWIxYzQtNWUxOWI3ZTAwY2Q1%40thread.v2%2F0%3Fcontext%3D%257B%2522Tid%2522%253A%2522eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%2522%252C%2522Oid%2522%253A%252236378197-03cc-469d-beec-60da9ce5f3aa%2522%257D%26anon%3Dtrue",
            "FRENCH": "https://teams.microsoft.com/l/meetup-join/19%3Ameeting_YTZlMmExOGItYmM2NS00MTUzLWFkMmUtNTQzN2QyZTc5ZTUw%40thread.v2/0?context=%7B%22Tid%22%3A%22eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%22%2C%22Oid%22%3A%226225bb49-d84d-44cc-818a-37b37128f6c9%22%7D"
        };

        const timetable = {
            Monday: [{start:"08:00",end:"08:45",name:"ENGLISH"},{start:"08:50",end:"09:35",name:"MATH"},{start:"09:40",end:"10:25",name:"SPECIAL ISLAMIC"},{start:"10:55",end:"11:40",name:"SCIENCE"},{start:"11:45",end:"12:30",name:"SPECIAL ARABIC"},{start:"12:35",end:"13:20",name:"P.E"}],
            Tuesday: [{start:"08:00",end:"08:45",name:"MATH"},{start:"08:50",end:"09:35",name:"ENGLISH"},{start:"09:40",end:"10:25",name:"MATH"},{start:"10:55",end:"11:40",name:"SCIENCE"},{start:"11:45",end:"12:30",name:"SPECIAL ARABIC"},{start:"12:35",end:"13:20",name:"FRENCH"}],
            Wednesday: [{start:"08:00",end:"08:45",name:"FRENCH"},{start:"08:50",end:"09:35",name:"ENGLISH"},{start:"09:40",end:"10:25",name:"SCIENCE"},{start:"10:55",end:"11:40",name:"MATH"},{start:"11:45",end:"12:30",name:"SPECIAL ARABIC"}],
            Thursday: [{start:"08:00",end:"08:45",name:"SCIENCE"},{start:"08:50",end:"09:35",name:"MATH"},{start:"09:40",end:"10:25",name:"ENGLISH"},{start:"10:55",end:"11:40",name:"SPECIAL ISLAMIC"},{start:"11:45",end:"12:30",name:"SPECIAL ARABIC"},{start:"12:35",end:"13:20",name:"ENGLISH/ME"}],
            Friday: [{start:"07:45",end:"08:20",name:"SPECIAL ARABIC"},{start:"08:25",end:"09:00",name:"P.E"},{start:"09:05",end:"09:35",name:"SCIENCE"},{start:"09:45",end:"10:20",name:"MATH"},{start:"10:25",end:"10:55",name:"ENGLISH"},{start:"11:00",end:"11:30",name:"FRENCH"}]
        };

        let currentActiveClassName = "";
        let selectedDay = new Date().toLocaleDateString('en-US', { weekday: 'long' });
        if (!timetable[selectedDay]) selectedDay = 'Monday';

        function switchDay(day) { selectedDay = day; renderSchedule(); }
        function joinActiveMeeting() { if (currentActiveClassName && links[currentActiveClassName]) window.open(links[currentActiveClassName], '_blank'); }

        function renderSchedule() {
            const container = document.getElementById('schedule-display');
            const dayData = timetable[selectedDay];
            const now = new Date();
            const todayName = now.toLocaleDateString('en-US', { weekday: 'long' });
            const currentTime = now.getHours() * 60 + now.getMinutes();

            document.querySelectorAll('.day-tab').forEach(t => {
                const isMatch = t.innerText === selectedDay.substring(0, 3).toUpperCase();
                t.style.opacity = isMatch ? '1' : '0.4';
                t.style.color = isMatch ? 'var(--primary)' : 'white';
            });

            let html = '';
            dayData.forEach(session => {
                const [sH, sM] = session.start.split(':').map(Number);
                const [eH, eM] = session.end.split(':').map(Number);
                const start = sH * 60 + sM;
                const end = eH * 60 + eM;
                const isActive = (selectedDay === todayName && currentTime >= start && currentTime < end);

                html += `<div class="p-4 rounded-2xl border ${isActive ? 'border-white bg-white/10 scale-[1.02]' : 'border-white/5 bg-white/5'} flex justify-between items-center transition-all">
                    <div class="text-left"><p class="font-['Orbitron'] font-black text-sm">${session.name}</p><p class="text-[10px] opacity-50 font-bold">${session.start} - ${session.end}</p></div>
                    ${isActive ? '<span class="bg-red-500 text-[8px] font-black px-2 py-1 rounded-md animate-pulse">LIVE</span>' : ''}
                </div>`;
            });
            container.innerHTML = html;
        }

        function updateUI() {
            const now = new Date();
            const dayName = now.toLocaleDateString('en-US', { weekday: 'long' });
            const currentTime = now.getHours() * 60 + now.getMinutes();
            const currentSeconds = now.getSeconds();
            
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const statusLabel = document.getElementById('status-label');
            const classNameDisplay = document.getElementById('current-class');
            const joinBtn = document.getElementById('join-status');
            const timerBox = document.getElementById('timer-container');

            const schedule = timetable[dayName] || [];
            let active = null;
            let breakTime = false;
            let coming = null;

            for (let i = 0; i < schedule.length; i++) {
                const s = schedule[i];
                const start = parseInt(s.start.split(':')[0]) * 60 + parseInt(s.start.split(':')[1]);
                const end = parseInt(s.end.split(':')[0]) * 60 + parseInt(s.end.split(':')[1]);

                if (currentTime >= start && currentTime < end) { active = s; break; }
                if (i < schedule.length - 1) {
                    const next = schedule[i+1];
                    const nStart = parseInt(next.start.split(':')[0]) * 60 + parseInt(next.start.split(':')[1]);
                    if (currentTime >= end && currentTime < nStart) { breakTime = true; coming = next; break; }
                }
                if (start > currentTime) { coming = s; break; }
            }

            if (active) {
                statusLabel.innerText = "CURRENTLY LIVE";
                classNameDisplay.innerText = active.name;
                currentActiveClassName = active.name;
                joinBtn.style.display = links[active.name] ? 'inline-block' : 'none';
                timerBox.style.display = 'none';
            } else if (breakTime || coming) {
                statusLabel.innerText = "UP NEXT";
                classNameDisplay.innerText = breakTime ? "5 MIN BREAK" : "GET READY";
                joinBtn.style.display = 'none';
                timerBox.style.display = 'block';
                const [nH, nM] = coming.start.split(':').map(Number);
                const diff = (nH * 60 + nM) - currentTime - 1;
                timerBox.innerText = `${coming.name} IN ${diff}m ${60-currentSeconds}s`;
            } else {
                statusLabel.innerText = "STANDBY";
                classNameDisplay.innerText = "SCHOOL'S OUT";
                joinBtn.style.display = 'none';
                timerBox.style.display = 'none';
            }
        }
        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
