    .font-display{font-family:"Archivo Black",sans-serif;letter-spacing:-0.04em;}
    .king-gradient{background:linear-gradient(to right,var(--accent),var(--accent-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    @keyframes wIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    @keyframes wSub{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .w-anim-1{opacity:0;animation:wSub .55s ease .1s forwards;}
    .w-anim-2{opacity:0;animation:wIn  .7s cubic-bezier(.22,1,.36,1) .25s forwards;}
    .w-anim-3{opacity:0;animation:wSub .5s ease .5s forwards;}
    .snack-card{
        cursor:pointer;
        transition:all .4s cubic-bezier(.175,.885,.32,1.275);
        border-color:transparent !important;
        position:relative;
      }
      .snack-card::before{
        content:"";
        position:absolute;inset:-1px;
        border-radius:inherit;
        padding:1.5px;
        background:conic-gradient(from var(--angle,0deg), transparent 0%, #a855f7 25%, #c084fc 50%, transparent 75%);
        -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite:xor;
        mask-composite:exclude;
        opacity:0;
        transition:opacity .3s ease;
        pointer-events:none;
        z-index:1;
      }
      .snack-card.selected::before{
        opacity:1;
        animation:borderSpin 1.8s linear infinite;
      }
      @property --angle{syntax:"<angle>";initial-value:0deg;inherits:false;}
      @keyframes borderSpin{to{--angle:360deg;}}
      .snack-card.selected{background:#0e0e0e;box-shadow:0 0 28px rgba(168,85,247,.18);}
      .snack-shadow{filter:drop-shadow(0 20px 40px rgba(168,85,247,.3));transition:transform .8s cubic-bezier(.22,1,.36,1);object-fit:contain;width:100%;height:100%;pointer-events:none;}
      .snack-card.selected .snack-shadow{transform:scale(1.08) translateY(-8px);}
      .boba-adjust{transform:scale(2.2) translate(10px,40px);}
      .selected .boba-adjust{transform:scale(2.35) translate(10px,42px);}
      .tiger-milk-pos{transform:scale(1.8) translate(65px,20px);}
      .selected .tiger-milk-pos{transform:scale(1.95) translate(70px,20px);}
      .snack-card.selected .snack-shadow:not(.boba-adjust):not(.tiger-milk-pos){
        transform:scale(1.12) translateY(-10px);
        filter:drop-shadow(0 24px 48px rgba(168,85,247,.5));

    .cart-sidebar.open{transform:translateX(0);}
    @keyframes shine-sweep{0%{transform:translateX(-200%) skewX(-20deg)}100%{transform:translateX(300%) skewX(-20deg)}}
    .shiny-wrap{position:relative;overflow:hidden;border-radius:9999px;}
    .shiny-wrap::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);animation:shine-sweep 2.4s linear infinite;border-radius:9999px;pointer-events:none;}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(120px);background:#a855f7;color:white;padding:1rem 2.5rem;border-radius:2rem;font-weight:900;text-transform:uppercase;font-style:italic;transition:all .4s;z-index:9000;box-shadow:0 15px 40px rgba(168,85,247,.5);opacity:0;pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .tap-active:active{transform:scale(.96);}
    .tab-btn{position:relative;}
    .tab-btn.active::after{content:"";position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:#a855f7;border-radius:2px;}

    #loader{position:fixed;inset:0;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;overflow-y:auto;}

    @keyframes loaderExit{0%{opacity:1}100%{opacity:0;visibility:hidden}}
    #logo-spin-wrap{position:relative;width:110px;height:110px;display:flex;align-items:center;justify-content:center;}

    #logo-ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid transparent;border-top-color:#a855f7;border-right-color:rgba(168,85,247,.3);animation:ringRotate 1s linear infinite;}

    @keyframes ringRotate{to{transform:rotate(360deg)}}
    #logo-img{width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid rgba(168,85,247,.6);position:relative;z-index:2;animation:logoSpin 1.4s cubic-bezier(.22,1,.36,1) infinite;box-shadow:0 0 30px rgba(168,85,247,.35);}
    @keyframes logoSpin{
      0%  {transform:rotateY(0deg)   scale(1);    filter:brightness(1)   drop-shadow(0 0 12px rgba(168,85,247,.6));}
      25% {transform:rotateY(90deg)  scale(0.82); filter:brightness(0.5) drop-shadow(0 0 4px rgba(168,85,247,.1));}
      50% {transform:rotateY(180deg) scale(1);    filter:brightness(1)   drop-shadow(0 0 12px rgba(168,85,247,.6));}
      75% {transform:rotateY(270deg) scale(0.82); filter:brightness(0.5) drop-shadow(0 0 4px rgba(168,85,247,.1));}
      100%{transform:rotateY(360deg) scale(1);    filter:brightness(1)   drop-shadow(0 0 12px rgba(168,85,247,.6));}
    }
    #logo-img-fb{display:none;width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#6b21a8,#3b0764);align-items:center;justify-content:center;font-family:"Archivo Black",sans-serif;font-size:2.5rem;color:white;border:2px solid rgba(168,85,247,.6);animation:logoSpin 1.4s cubic-bezier(.22,1,.36,1) infinite;box-shadow:0 0 30px rgba(168,85,247,.35);}
    #prog-bar{width:120px;height:2px;background:rgba(168,85,247,.12);border-radius:2px;overflow:hidden;margin-top:28px;}
    #prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#a855f7,#c084fc);border-radius:2px;transition:width .25s ease;}
    #loader-label{margin-top:14px;font-weight:900;letter-spacing:.55em;font-size:10px;text-transform:uppercase;color:rgba(168,85,247,.6);font-style:italic;animation:labelPulse 1.4s ease-in-out infinite;}
    @keyframes labelPulse{0%,100%{opacity:.3}50%{opacity:1}}
    #app{display:none;}
    #app.entering{animation:appEnter .6s cubic-bezier(.22,1,.36,1) forwards;}
    @keyframes appEnter{from{opacity:0}to{opacity:1}}

    #tap-zone{position:absolute;width:0;height:0;overflow:hidden;pointer-events:none;}

window.FK_DB = {
  async saveOrder(data){
    const ref = await addDoc(collection(db,"orders"),{...data,created:serverTimestamp(),status:"pending"});
    return ref.id;
  },
  async getOrder(id){
    const snap = await getDoc(doc(db,"orders",id));
    return snap.exists()?{id:snap.id,...snap.data()}:null;
  },
  async getAllOrders(){
    const q = query(collection(db,"orders"),orderBy("created","desc"));
    const snap = await getDocs(q);

  },
  async markComplete(id){ await updateDoc(doc(db,"orders",id),{status:"complete"}); },
  async updateOrderStatus(id, status){ await updateDoc(doc(db,"orders",id),{status}); },
  async deleteOrder(id){ await deleteDoc(doc(db,"orders",id)); },
  async getSettings(){
    try{ const snap=await getDoc(doc(db,"config","settings")); return snap.exists()?snap.data():{}; }
    catch(e){ return {}; }
  },
  async saveSettings(data){ await setDoc(doc(db,"config","settings"),data,{merge:true}); },
  async getProducts(){
    try{ const snap=await getDoc(doc(db,"config","products")); return snap.exists()?snap.data().list:null; }

    async saveUserInfo(hwid, info){

    async getAllUsers(){
      try{
        const snap = await getDocs(collection(db,"users"));
        return snap.docs.map(d=>({hwid:d.id,...d.data()}));
      }catch(e){ return []; }
    },
    async banUser(hwid, reason, durationHours){
      const until = durationHours===0 ? 0 : Date.now() + durationHours*60*60*1000;
      await setDoc(doc(db,"bans",hwid),{reason, until, bannedAt:Date.now()},{merge:true});
    },
    async unbanUser(hwid){ await deleteDoc(doc(db,"bans",hwid)); },
    async checkBan(hwid){
      try{
        const snap = await getDoc(doc(db,"bans",hwid));
        if(!snap.exists()) return null;
        const ban = snap.data();
        if(ban.until !== 0 && Date.now() > ban.until){
          await deleteDoc(doc(db,"bans",hwid));
          return null;
        }
        return ban;
      }catch(e){ return null; }
    },

        return snap.docs.map(d=>({hwid:d.id,...d.data()}));

function applyTheme(key,saveGlobal=false){
  const t=THEMES[key]||THEMES.purple;
  document.body.style.background=t.bg;
  const root=document.documentElement;
  root.style.setProperty("--accent",t.accent);
  root.style.setProperty("--accent-dark",t.accentDark);
  const hex=t.accent.replace("#","");
  const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  root.style.setProperty("--accent-rgb",r+","+g+","+b);
  currentTheme=key; localStorage.setItem("fk_theme",key);
  if(saveGlobal&&window.FK_DB) window.FK_DB.saveSettings({globalTheme:key}).catch(()=>{});
}

/* ── HELPERS ── */
function showLoader(){
  const l=document.getElementById("loader");
  if(l){ l.style.display="flex"; l.classList.remove("fade-out"); }
}
function hideLoader(){
  const loader=document.getElementById("loader");
  if(!loader)return;
  loader.classList.add("fade-out");
  setTimeout(()=>{ loader.style.display="none"; },600);
}
function revealApp(){
  const app=document.getElementById("app");
  if(app){ app.style.display="block"; app.classList.add("entering"); }
}

/* ── LAUNCH WITH PROGRESS BAR ── */
function runLoader(cb){
  const fill=document.getElementById("prog-fill");
  showLoader();
  let pct=0;
  const pi=setInterval(()=>{ pct=Math.min(pct+(Math.random()*18+5),92); fill.style.width=pct+"%"; },160);
  setTimeout(()=>{
    clearInterval(pi); fill.style.width="100%";
    setTimeout(()=>{ hideLoader(); setTimeout(cb,100); },300);
  },1800);
}

/* ── PWA CHECK + LOADER ── */
(function(){
  const isStandalone =
    window.navigator.standalone === true ||
    window.matchMedia("(display-mode:standalone)").matches ||
    window.matchMedia("(display-mode:fullscreen)").matches;

  // FIX: also treat as "installed" if user previously completed a boot from installed mode
  const wasInstalled = !!localStorage.getItem("fk_was_installed");

  if(isStandalone){
    // Running as installed PWA — mark it and launch
    localStorage.setItem("fk_was_installed","1");
    runLoader(()=>{ revealApp(); bootApp(); });

  } else {
    // Running in browser
    const dismissed = localStorage.getItem("fk_install_dismissed");
    if(!dismissed){
      showInstallGuide();
    } else {
      runLoader(()=>{ revealApp(); bootApp(); });
    }
  }
})();

/* ── BOOT ── */
async function bootApp(){
  // FIX: Check flag first — event may have already fired before bootApp was called
  if(!window.FK_DB && !window._fkReady){
    await new Promise(r=>{
      const t = setTimeout(r, 5000); // max 5s fallback
      window.addEventListener("fk-ready", ()=>{ clearTimeout(t); r(); }, {once:true});
    });
  }
  // Small extra wait if FK_DB still isn't assigned (race condition)
  if(!window.FK_DB){
    await new Promise(r=>setTimeout(r,500));
  }

  try{
    if(window.FK_DB){
      const settings=await window.FK_DB.getSettings();
      if(settings.waLink) GROUP_LINK=settings.waLink;
      if(settings.ytLink) YT=settings.ytLink;
      if(settings.globalTheme) applyTheme(settings.globalTheme);
      window._banner=settings.bannerEnabled?{text:settings.bannerText||"",bg:settings.bannerBg||"#ef4444",tc:settings.bannerTextColor||"#ffffff"}:null;
      if(settings.siteDown){
        const msg=settings.siteDownMsg||"The shop is temporarily closed. Check back later.";
        const sdMsg=document.getElementById("site-down-msg");
        if(sdMsg) sdMsg.textContent=msg;
        const sdOverlay=document.getElementById("site-down-overlay");
        if(sdOverlay) sdOverlay.style.display="flex";
        setupTapZone();
        return;
      }
      const remote=await window.FK_DB.getProducts();
      if(remote&&remote.length>0) SNACKS=remote;

      const HWID = getOrCreateHWID();
      const ban = await window.FK_DB.checkBan(HWID);
      if(ban){
        const until = ban.until===0?"Permanent":new Date(ban.until).toLocaleDateString("en-AE");
        const loader=document.getElementById("loader");
        if(loader) loader.style.display="none";
        const app=document.getElementById("app");
        if(app){ app.style.display="block"; }
        app.innerHTML=`<div style="position:fixed;inset:0;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;">
          <div style="width:64px;height:64px;border-radius:18px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
            <i class="fas fa-ban" style="color:#ef4444;font-size:1.6rem;"></i>
          </div>
          <h2 style="font-family:'Archivo Black',sans-serif;font-size:22px;text-transform:uppercase;letter-spacing:-0.03em;margin-bottom:8px;">Access Restricted</h2>
          <p style="font-size:13px;color:rgba(255,255,255,.4);line-height:1.7;max-width:280px;margin-bottom:12px;">${ban.reason||"You have been restricted from this app."}</p>
          <p style="font-size:11px;color:rgba(239,68,68,.6);">Until: ${until}</p>
        </div>`;
        return;
      }
      }
    }catch(e){ console.warn("Settings load failed, using defaults",e); }

    buildApp();
    setupTapZone();

  if(window.FK_AUTH){
    window.FK_AUTH.onAuth(user=>{ _adminUser=user; });
  }
}

/* ── TAP ZONE ── */
function setupTapZone(){
  const NEEDED   = 5;
  const WINDOW   = 2000;
  const COOLDOWN = 5*60*1000;
  let lastTrigger = 0;

  function attachToTitle(){
    const title = document.querySelector("h1.font-display");
    if(!title) return;
    title.style.userSelect = "none";
    title.style.webkitUserSelect = "none";

    function onTap(e){
      e.stopPropagation();
      const now = Date.now();
      if(now - lastTrigger < COOLDOWN) return;
      if(tapCount > 0 && now - (window._lastAdminTap||0) > WINDOW){ tapCount = 0; }
      window._lastAdminTap = now;
      tapCount++;
      if(tapCount >= NEEDED){ tapCount = 0; lastTrigger = now; openAdminSignin(); }
    }
    title.addEventListener("click", onTap);
    title.addEventListener("touchend", onTap, {passive:true});
  }

  attachToTitle();
  setTimeout(attachToTitle, 500);
  setTimeout(attachToTitle, 1500);
}

async function doAdminSignIn(){
  const err=document.getElementById("admin-signin-err");
  err.style.display="none";
  try{
    const user=await window.FK_AUTH.signInGoogle();
    if(!window.FK_AUTH.isAdmin(user)){
      await window.FK_AUTH.signOut();
      err.textContent="Access denied — this account is not authorised.";
      err.style.display="block";
      return;
    }
    _adminUser=user;
    closeAdminSignin();
    openAdmin();
  }catch(e){
    err.textContent="Sign in failed. Make sure popups are allowed and try again.";
    err.style.display="block";
  }
}
async function doAdminSignOut(){
  await window.FK_AUTH.signOut();

}

function admTab(name){
  const t=THEMES[currentTheme]||THEMES.purple;
  ["orders","products","themes","settings","users","web","analytics"].forEach(n=>{
    const btn=document.getElementById("atb-"+n);
    if(!btn)return;
    const active=n===name;
    btn.style.color=active?t.accent:"rgba(255,255,255,.3)";
    btn.style.borderBottom=active?`2px solid ${t.accent}`:"2px solid transparent";
  });
  const c=document.getElementById("adm-content");
  if(!c)return;
  if(name==="orders")   renderAdmOrders(c);
  if(name==="products") renderAdmProducts(c);
  if(name==="themes")   renderAdmThemes(c);
  if(name==="settings") renderAdmSettings(c);
  if(name==="users")    renderAdmUsers(c);
  if(name==="web")      renderAdmWeb(c);
  if(name==="analytics")renderAdmAnalytics(c);
}

        <p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">PENDING</p>
      </div>
      <div style="background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.15);border-radius:14px;padding:12px;text-align:center;">
        <p style="font-family:'Archivo Black',sans-serif;font-size:16px;color:#22c55e;">AED ${rev}</p>

function filterAdmOrders(){
  const search=(document.getElementById("adm-search")?.value||"").toLowerCase();
  const filter=document.getElementById("adm-filter")?.value||"all";
  let list=adminOrders.filter(o=>o.status!=="archived");
    if(filter==="archived") list=adminOrders.filter(o=>o.status==="archived");
    else if(filter!=="all") list=list.filter(o=>o.status===filter);
  if(search) list=list.filter(o=>(o.id||"").toLowerCase().includes(search)||(o.customer?.name||"").toLowerCase().includes(search)||(o.customer?.grade||"").toLowerCase().includes(search));
  const el=document.getElementById("adm-orders-list");
  if(!el)return;
  if(!list.length){el.innerHTML=`<p style="text-align:center;color:rgba(255,255,255,.2);font-size:13px;padding:32px 0;">No orders found</p>`;return;}
  el.innerHTML=list.map(o=>{
    const ts=o.created?.seconds?o.created.seconds*1000:(o.created||Date.now());
    const ds=new Date(ts).toLocaleDateString("en-AE",{day:"2-digit",month:"short"});
    const tm=new Date(ts).toLocaleTimeString("en-AE",{hour:"2-digit",minute:"2-digit"});
    const its=(o.items||[]).map(i=>`${i.name} ×${i.qty}`).join(", ");
    const st=getStatusStyle(o.status||"pending");
    return `<div style="border-radius:16px;border:1px solid ${st.border};background:${st.bg.replace(".1)",".03)")};padding:14px;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div>
          <p style="font-size:10px;font-weight:900;color:#a855f7;letter-spacing:.05em;">#${(o.id||"").substring(0,14)}</p>
          <p style="font-weight:800;font-size:15px;margin-top:2px;">${o.customer?.name||"Unknown"}</p>
        </div>
        <div style="text-align:right;">
          <span style="font-size:10px;font-weight:900;padding:3px 10px;border-radius:100px;background:${st.bg};color:${st.color};border:1px solid ${st.border};">${st.label.toUpperCase()}</span>
          <p style="font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;">${ds} · ${tm}</p>
        </div>
      </div>
      <p style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:3px;">🎓 ${o.customer?.grade||"—"} &nbsp;·&nbsp; 📅 ${o.customer?.date||"—"}</p>
      <p style="font-size:11px;color:rgba(255,255,255,.25);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:10px;">${its}</p>
      <div id="items-detail-${o.id}" style="display:none;margin-bottom:10px;background:rgba(255,255,255,.03);border-radius:10px;padding:10px;">
        ${(o.items||[]).map(i=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;"><span style="color:rgba(255,255,255,.6);">${i.name} ×${i.qty}</span><span style="font-weight:700;">AED ${i.price*i.qty}</span></div>`).join("")}
        <div style="border-top:1px solid rgba(255,255,255,.06);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-size:13px;font-weight:900;"><span style="color:rgba(255,255,255,.4);">Total</span><span style="color:#a855f7;">AED ${o.total||0}</span></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-weight:900;color:#a855f7;font-size:15px;">AED ${o.total||0}</span>

        </div>
        <div style="display:flex;gap:6px;">
          <button onclick="openStatusPicker('${o.id}','${o.status||"pending"}')" style="background:${st.bg};border:1px solid ${st.border};border-radius:10px;padding:7px 12px;color:${st.color};font-size:11px;font-weight:800;cursor:pointer;font-family:Inter,sans-serif;">Status ▾</button>
          <button onclick="admArchiveOrder('${o.id}')" title="Archive" style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);border-radius:10px;padding:7px 10px;color:#f87171;font-size:11px;cursor:pointer;">✓ Done</button>

  async function admArchiveOrder(id){

async function saveProductModal(){
  const name=document.getElementById("pm-name").value.trim();
  const price=parseFloat(document.getElementById("pm-price").value)||0;
  const desc=document.getElementById("pm-desc").value.trim();
  const img=document.getElementById("pm-img").value.trim();
  const cat=document.getElementById("pm-cat").value;
  const sticker=(document.getElementById("pm-sticker")?.value||"").trim();
  const stickerBg=document.getElementById("pm-sticker-bg")?.value||"#ef4444";
  const stickerColor=document.getElementById("pm-sticker-color")?.value||"#ffffff";
  const featured=!!(document.getElementById("pm-featured")?.checked);
  const outOfStock=!!(document.getElementById("pm-oos")?.checked);
  if(!name||!price||!img){showToast("Fill in all fields");return;}
  if(_editProdId){
    const s=SNACKS.find(x=>x.id===_editProdId);
    if(s){s.name=name;s.price=price;s.desc=desc;s.img=img;s.category=cat;s.sticker=sticker;s.stickerBg=stickerBg;s.stickerColor=stickerColor;s.featured=featured;s.outOfStock=outOfStock;}
  } else {
    SNACKS.push({id:Math.max(0,...SNACKS.map(s=>s.id))+1,name,price,desc,img,category:cat,sticker,stickerBg,stickerColor,featured,outOfStock});
  }
  try{await window.FK_DB.saveProducts(SNACKS);}catch(e){console.warn(e);}
  document.getElementById("prod-modal").style.display="none";
  renderProducts(currentFilter);
  renderAdmProducts(document.getElementById("adm-content"));
  showToast(_editProdId?"Product updated!":"Product added!");
}
async function admDeleteProduct(id){
  if(!confirm("Remove this product?"))return;
  SNACKS=SNACKS.filter(s=>s.id!==id);
  try{await window.FK_DB.saveProducts(SNACKS);}catch(e){}
  renderProducts(currentFilter);
  renderAdmProducts(document.getElementById("adm-content"));
  showToast("Product removed");
}

function filterTab(btn,cat){
  document.querySelectorAll(".tab-btn").forEach(b=>{b.classList.remove("active","text-white");b.classList.add("text-white/40");});

}
function selectSnack(id){
  const prev=selectedSnack;
  selectedSnack=selectedSnack===id?null:id;
  if(prev){const c=document.getElementById("card-"+prev);if(c)c.classList.remove("selected");}
  if(selectedSnack){const c=document.getElementById("card-"+selectedSnack);if(c)c.classList.add("selected");}
}

/* ── CART ── */
function getQty(id){const i=cart.find(x=>x.id===id);return i?i.qty:0;}
function cartTotal(){return cart.reduce((s,i)=>s+i.price*i.qty,0);}
function cartCount(){return cart.reduce((s,i)=>s+i.qty,0);}
function addToCart(id){
  const s=SNACKS.find(x=>x.id===id);if(!s)return;
  const e=cart.find(x=>x.id===id);if(e)e.qty++;else cart.push({...s,qty:1});
  saveCart();updateCartUI();updateCardControls(id);showToast(`${s.name} added!`);
}
function changeQty(id,d){
  const i=cart.find(x=>x.id===id);if(!i)return;
  i.qty=Math.max(0,i.qty+d);if(i.qty===0)cart=cart.filter(x=>x.id!==id);
  saveCart();updateCartUI();updateCardControls(id);renderCartItems();
}
function updateCardControls(id){
  const card=document.getElementById("card-"+id);if(!card)return;
  const s=SNACKS.find(x=>x.id===id);if(!s)return;
  const qty=getQty(id);
  const ctrl=card.querySelector(".flex.items-center.justify-between.mt-3");if(!ctrl)return;
  ctrl.innerHTML=qty===0
    ?`<button onclick="event.stopPropagation();addToCart(${id})" class="shiny-wrap tap-active px-5 py-2.5 rounded-full text-white font-black text-xs uppercase tracking-wider" style="background:linear-gradient(135deg,var(--accent),var(--accent-dark))">Add to Bag</button>`
    :`<div class="flex items-center gap-3" onclick="event.stopPropagation()"><button onclick="changeQty(${id},-1)" class="w-8 h-8 rounded-full bg-white/8 flex items-center justify-center font-black text-base tap-active">−</button><span class="font-black text-base">${qty}</span><button onclick="changeQty(${id},1)" class="w-8 h-8 rounded-full flex items-center justify-center font-black text-base tap-active" style="background:linear-gradient(135deg,var(--accent),var(--accent-dark))">+</button></div><span class="text-white/25 text-xs">AED ${s.price*qty}</span>`;
}
function saveCart(){localStorage.setItem("fk_cart",JSON.stringify(cart));}
function updateCartUI(){
  const n=cartCount(),t=cartTotal();
  const b=document.getElementById("cart-badge");if(b){b.textContent=n;b.classList.toggle("hidden",n===0);}
  const ct=document.getElementById("cart-total-txt");if(ct)ct.textContent="AED "+t;
  const cc=document.getElementById("cart-count-txt");if(cc)cc.textContent=n+(n===1?" item":" items");
}
function renderCartItems(){
  const el=document.getElementById("cart-items");if(!el)return;
  if(!cart.length){el.innerHTML=`<p class="text-center text-white/20 text-sm py-12">Your bag is empty</p>`;return;}

function receiptUrl(id){return location.origin+location.pathname.replace(/\/[^/]*$/,"/")+`receipt.html?orderId=${id}`;}

  const items=o.items.map(i=>`  • ${i.name} ×${i.qty}  —  AED ${i.price*i.qty}`).join("\n");
  return `🛍️ *NEW ORDER — Fares King*\n\n🆔 *${o.id}*\n👤 ${o.customer.name}\n🎓 ${o.customer.grade}\n📅 ${o.customer.date}\n\n🛒 Items:\n${items}\n\n💰 *Total: AED ${o.total}*\n\n🧾 Receipt: ${receiptUrl(o.id)}`;
}
function openShareModal(o){

async function buildHistoryDrawer(){

        <button onclick="document.getElementById('history-drawer').remove()" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:9px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;font-size:13px;">✕</button>
      </div>
    </div>
    <div id="history-orders-list" style="flex:1;overflow-y:auto;padding:0 20px 20px;">
      <div style="text-align:center;padding:40px;"><i class="fas fa-spinner fa-spin" style="color:var(--accent);font-size:1.3rem;"></i></div>
    </div>
  </div>`;
  drawer.addEventListener("click",e=>{if(e.target===drawer)drawer.remove();});

  /* Fetch live status from Firestore for every saved order */
  const historyIds=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("fk_order_")) historyIds.push(k.replace("fk_order_",""));}
  let orders=[];
  try{
    const fetched = await Promise.all(historyIds.map(id=>window.FK_DB.getOrder(id).catch(()=>null)));
    orders = fetched.filter(Boolean).sort((a,b)=>{
      const ta=a.created?.seconds?a.created.seconds*1000:(a.created||0);
      const tb=b.created?.seconds?b.created.seconds*1000:(b.created||0);
      return tb-ta;
    });
    /* Update localStorage cache with fresh status */
    orders.forEach(o=>{ try{ const local=JSON.parse(localStorage.getItem("fk_order_"+o.id)||"{}"); localStorage.setItem("fk_order_"+o.id,JSON.stringify({...local,...o})); }catch(e){} });
  }catch(e){
    orders=historyIds.map(id=>{try{return JSON.parse(localStorage.getItem("fk_order_"+id));}catch(e2){return null;}}).filter(Boolean);
  }
  const el=document.getElementById("history-orders-list");

    el.innerHTML=`<p style="text-align:center;color:rgba(255,255,255,.2);font-size:13px;padding:40px 0;">No order history on this device</p>`;
    return;
  }

    const ts=o.created?.seconds?o.created.seconds*1000:(o.created||Date.now());
    const ds=new Date(ts).toLocaleDateString("en-AE",{day:"2-digit",month:"short",year:"numeric"});
    const sc=STATUS_COLORS[o.status]||"#fbbf24";
    const sl=STATUS_LABELS[o.status]||"Pending";
    const its=(o.items||[]).map(i=>i.name+(i.qty>1?" ×"+i.qty:"")).join(", ");
    return`<div onclick="document.getElementById('history-drawer').remove();location.href='receipt.html?orderId=${o.id}'" style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:13px;margin-bottom:10px;cursor:pointer;">

        <div>

        </div>
        <div style="text-align:right;">
          <span style="font-size:10px;font-weight:900;padding:2px 9px;border-radius:100px;background:${sc}18;color:${sc};border:1px solid ${sc}33;">${sl}</span>
          <p style="font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;">${ds}</p>
        </div>
      </div>
      <p style="font-size:11px;color:rgba(255,255,255,.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px;">${its}</p>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:900;color:#a855f7;font-size:14px;">AED ${o.total||0}</span>
        <span style="font-size:11px;color:rgba(168,85,247,.6);font-weight:700;">View Receipt →</span>
      </div>
    </div>`;
  }).join("");
}

  const bannerEnabled=document.getElementById("web-banner-toggle")?.dataset.on==="1";
  const bannerText=(document.getElementById("web-banner-text")?.value||"").trim();
  const bannerBg=document.getElementById("web-banner-bg")?.value||"#ef4444";
  const bannerTextColor=document.getElementById("web-banner-tc")?.value||"#ffffff";
  try{
    await window.FK_DB.saveSettings({bannerEnabled,bannerText,bannerBg,bannerTextColor});
    window._banner=bannerEnabled?{text:bannerText,bg:bannerBg,tc:bannerTextColor}:null;
    showToast("Web settings saved ✓");
  }catch(e){showToast("Save failed");}
}

/* ── ANALYTICS TAB ── */
async function renderAdmAnalytics(c){
  if(!c)return;
  c.innerHTML=`<div style="text-align:center;padding:40px;"><i class="fas fa-spinner fa-spin" style="color:var(--accent);font-size:1.3rem;"></i></div>`;
  let orders=adminOrders;
  if(!orders||!orders.length){
    try{orders=await window.FK_DB.getAllOrders();}catch(e){orders=[];}
  }
  const done=orders.filter(o=>o.status==="complete"||o.status==="archived");
  const rev=done.reduce((s,o)=>s+(o.total||0),0);
  const avg=done.length?Math.round(rev/done.length):0;
  // Daily revenue for past 7 days
  const days={};for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days[d.toLocaleDateString("en-AE")]=0;}
  done.forEach(o=>{const ts=o.created?.seconds?o.created.seconds*1000:(o.created||0);const d=new Date(ts).toLocaleDateString("en-AE");if(days[d]!==undefined)days[d]+=(o.total||0);});
  const dayKeys=Object.keys(days);
  const maxVal=Math.max(...Object.values(days),1);
  // Item frequency
  const cts={};orders.forEach(o=>(o.items||[]).forEach(i=>{cts[i.name]=(cts[i.name]||0)+i.qty;}));
  const topItems=Object.entries(cts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  c.innerHTML=`<div style="padding:14px 16px;">
    <p style="font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;font-weight:900;margin-bottom:14px;">📊 Analytics</p>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;">
      <div style="background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.15);border-radius:14px;padding:13px;text-align:center;">
        <p style="font-family:'Archivo Black',sans-serif;font-size:24px;">${orders.length}</p>
        <p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">TOTAL ORDERS</p>
      </div>
      <div style="background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.15);border-radius:14px;padding:13px;text-align:center;">
        <p style="font-family:'Archivo Black',sans-serif;font-size:20px;color:#22c55e;">AED ${rev}</p>
        <p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">REVENUE</p>
      </div>
      <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:13px;text-align:center;">
        <p style="font-family:'Archivo Black',sans-serif;font-size:20px;">AED ${avg}</p>
        <p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">AVG ORDER</p>
      </div>
      <div style="background:rgba(251,191,36,.04);border:1px solid rgba(251,191,36,.15);border-radius:14px;padding:13px;text-align:center;">
        <p style="font-family:'Archivo Black',sans-serif;font-size:24px;color:#fbbf24;">${orders.filter(o=>o.status!=="complete"&&o.status!=="archived").length}</p>
        <p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">PENDING</p>
      </div>
    </div>
    <!-- Bar chart -->
    <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px;margin-bottom:12px;">
      <p style="font-size:11px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;font-weight:900;margin-bottom:12px;">Revenue — Last 7 Days</p>
      <div style="display:flex;align-items:flex-end;gap:5px;height:80px;">
        ${dayKeys.map(d=>{const v=days[d];const pct=Math.round((v/maxVal)*100);return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
          <div style="width:100%;border-radius:4px 4px 0 0;background:linear-gradient(to top,var(--accent),var(--accent-dark));height:${pct}%;min-height:${v>0?4:1}px;"></div>
          <span style="font-size:8px;color:rgba(255,255,255,.25);">${d.split("/").slice(0,2).join("/")}</span>
        </div>`;}).join("")}
      </div>
    </div>
    <!-- Top items -->
    <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px;">
      <p style="font-size:11px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;font-weight:900;margin-bottom:10px;">Top Items</p>
      ${topItems.length?topItems.map(([n,q],i)=>`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:10px;color:rgba(255,255,255,.2);width:14px;">${i+1}</span>
          <span style="font-size:13px;font-weight:700;">${n}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="height:4px;border-radius:2px;background:linear-gradient(to right,var(--accent),var(--accent-dark));width:${Math.round((q/topItems[0][1])*80)}px;"></div>
          <span style="font-size:12px;font-weight:800;color:var(--accent);">×${q}</span>
        </div>
      </div>`).join(""):`<p style="text-align:center;color:rgba(255,255,255,.2);font-size:13px;padding:20px 0;">No data yet</p>`}
    </div>
  </div>`;
}

  /* ── TOAST ── */
  let _tt;
  function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove("show"),2200);}
</script>
