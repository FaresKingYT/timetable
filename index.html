<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaresKingYT | Official Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');

        :root {
            --primary: #9333ea;
            --accent: #c084fc;
            --break: #fbbf24;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            background: #0f0518;
            background: linear-gradient(-45deg, #0f0518, #1a0b2e, #0a0a0a, #2e1065);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stars-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            opacity: 0.3;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .logo-container {
            margin-bottom: 2.5rem;
            animation: float 4s ease-in-out infinite;
        }

        .logo-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 8px solid var(--primary);
            box-shadow: 0 0 60px rgba(147, 51, 234, 0.8);
            object-fit: cover;
            background: #111;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
        }

        .status-card {
            background: rgba(147, 51, 234, 0.15);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 4px solid rgba(147, 51, 234, 0.5);
            border-radius: 50px;
            padding: 5rem 3rem;
            margin-bottom: 4rem;
            width: 100%;
            box-shadow: 0 0 100px rgba(147, 51, 234, 0.4);
        }

        .status-card.is-break {
            border-color: var(--break);
            box-shadow: 0 0 100px rgba(251, 191, 36, 0.4);
            background: rgba(251, 191, 36, 0.1);
        }

        .current-class-label {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 12px;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .is-break .current-class-label { color: var(--break); }

        .class-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 6rem);
            font-weight: 900;
            margin: 1.5rem 0;
            text-shadow: 0 0 40px rgba(147, 51, 234, 0.9);
            line-height: 1.1;
            letter-spacing: -2px;
        }

        .time-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            opacity: 0.9;
            margin-top: 2rem;
            letter-spacing: 6px;
            font-weight: 700;
        }

        .btn-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            margin-top: 2rem;
        }

        .glass-btn {
            padding: 2rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(147, 51, 234, 0.4);
            border-radius: 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .glass-btn:hover {
            background: rgba(147, 51, 234, 0.6);
            transform: scale(1.1);
            box-shadow: 0 25px 50px rgba(147, 51, 234, 0.5);
            border-color: #fff;
        }

        .join-now {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-top: 2.5rem;
            font-weight: 900;
            animation: pulse 1.5s infinite ease-in-out;
            color: #fff;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.2s;
        }

        .join-now:hover {
            transform: scale(1.15);
            text-shadow: 0 0 20px #fff;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @media (max-width: 768px) {
            .class-name { font-size: 3rem; }
            .time-display { font-size: 2rem; }
            .status-card { padding: 3rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="stars-overlay"></div>

    <div class="content">
        <div class="logo-container">
            <img src="https://unavatar.io/youtube/FaresKingYT" alt="FaresKingYT Logo" class="logo-img">
        </div>

        <div class="status-card" id="card-element">
            <div class="current-class-label" id="status-label">INITIALIZING</div>
            <div class="class-name" id="current-class">FARESKINGYT</div>
            <div class="time-display" id="clock">00:00:00</div>
            <div id="timer-container" style="display: none; font-size: 2rem; color: var(--break); font-family: Orbitron; margin-top: 25px; font-weight: 700;"></div>
            <div class="join-now" id="join-status" onclick="joinActiveMeeting()">JOIN CLASS</div>
        </div>

        <div class="btn-container">
            <a href="https://teams.microsoft.com/meet/3687673226102?p=I7BxGKoPw4zY6nvSws" target="_blank" class="glass-btn" id="link-social">SOCIAL STUDIES</a>
            <a href="https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fl%2Fmeetup-join%2F19%3Ameeting_ZmQxZDIxZTAtZWI3Ny00MjY1LTg4ZjgtNTU4MjNlYTRhMmVm%40thread.v2%2F0%3Fcontext%3D%257B%2522Tid%2522%253A%2522eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%2522%252C%2522Oid%2522%253A%2522289c9388-c1b1-4c07-896a-2372670634e3%2522%257D%26anon%3Dtrue&type=meetup-join&deeplinkId=9db1a8de-4e14-4f7f-9986-31c83ed45760&directDl=true&msLaunch=true&enableMobilePage=true&suppressPrompt=true" target="_blank" class="glass-btn" id="link-math">MATH</a>
            <a href="https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fl%2Fmeetup-join%2F19%3Ameeting_OTg0ODZmY2ItNmE4Yy00YzU3LWFiYzMtNDkzYzRhNDliOTlh%40thread.v2%2F0%3Fcontext%3D%257B%2522Tid%2522%253A%2522eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%2522%252C%2522Oid%2522%253A%2522289c9388-c1b1-4c07-896a-2372670634e3%2522%257D%26anon%3Dtrue&type=meetup-join&deeplinkId=5314b6ee-2df9-4645-8061-11784ab1f379&directDl=true&msLaunch=true&enableMobilePage=true&suppressPrompt=true" target="_blank" class="glass-btn" id="link-english">ENGLISH</a>
            <a href="https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fl%2Fmeetup-join%2F19%3Ameeting_YjBkNWY4YWYtYThiMi00YjQ4LWIxYzQtNWUxOWI3ZTAwY2Q1%40thread.v2%2F0%3Fcontext%3D%257B%2522Tid%2522%253A%2522eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%2522%252C%2522Oid%2522%253A%252236378197-03cc-469d-beec-60da9ce5f3aa%2522%257D%26anon%3Dtrue&type=meetup-join&deeplinkId=e50d47a3-0bb3-4424-b2a8-2eeadaee256a&directDl=true&msLaunch=true&enableMobilePage=true" target="_blank" class="glass-btn" id="link-science">SCIENCE</a>
            <a href="https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fmeet%2F3220483892366%3Fp%3D4BOcRYBujjT68E5w4u%26anon%3Dtrue&type=meet&deeplinkId=e113462a-5dc2-4fa6-9f5f-bd9e223b50b1&directDl=true&msLaunch=true&enableMobilePage=true" target="_blank" class="glass-btn" id="link-islamic">ISLAMIC</a>
            <a href="https://teams.microsoft.com/l/meetup-join/19%3Ameeting_YTZlMmExOGItYmM2NS00MTUzLWFkMmUtNTQzN2QyZTc5ZTUw%40thread.v2/0?context=%7B%22Tid%22%3A%22eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%22%2C%22Oid%22%3A%226225bb49-d84d-44cc-818a-37b37128f6c9%22%7D" target="_blank" class="glass-btn" id="link-french">FRENCH</a>
        </div>
    </div>

    <script>
        const links = {
            "SOCIAL STUDIES": "https://teams.microsoft.com/meet/3687673226102?p=I7BxGKoPw4zY6nvSws",
            "MATH": "https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fl%2Fmeetup-join%2F19%3Ameeting_ZmQxZDIxZTAtZWI3Ny00MjY1LTg4ZjgtNTU4MjNlYTRhMmVm%40thread.v2%2F0%3Fcontext%3D%257B%2522Tid%2522%253A%2522eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%2522%252C%2522Oid%2522%253A%2522289c9388-c1b1-4c07-896a-2372670634e3%2522%257D%26anon%3Dtrue&type=meetup-join&deeplinkId=9db1a8de-4e14-4f7f-9986-31c83ed45760&directDl=true&msLaunch=true&enableMobilePage=true&suppressPrompt=true",
            "ENGLISH": "https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fl%2Fmeetup-join%2F19%3Ameeting_OTg0ODZmY2ItNmE4Yy00YzU3LWFiYzMtNDkzYzRhNDliOTlh%40thread.v2%2F0%3Fcontext%3D%257B%2522Tid%2522%253A%2522eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%2522%252C%2522Oid%2522%253A%2522289c9388-c1b1-4c07-896a-2372670634e3%2522%257D%26anon%3Dtrue&type=meetup-join&deeplinkId=5314b6ee-2df9-4645-8061-11784ab1f379&directDl=true&msLaunch=true&enableMobilePage=true&suppressPrompt=true",
            "SCIENCE": "https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fl%2Fmeetup-join%2F19%3Ameeting_YjBkNWY4YWYtYThiMi00YjQ4LWIxYzQtNWUxOWI3ZTAwY2Q1%40thread.v2%2F0%3Fcontext%3D%257B%2522Tid%2522%253A%2522eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%2522%252C%2522Oid%2522%253A%252236378197-03cc-469d-beec-60da9ce5f3aa%2522%257D%26anon%3Dtrue&type=meetup-join&deeplinkId=e50d47a3-0bb3-4424-b2a8-2eeadaee256a&directDl=true&msLaunch=true&enableMobilePage=true",
            "SPECIAL ISLAMIC": "https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fmeet%2F3220483892366%3Fp%3D4BOcRYBujjT68E5w4u%26anon%3Dtrue&type=meet&deeplinkId=e113462a-5dc2-4fa6-9f5f-bd9e223b50b1&directDl=true&msLaunch=true&enableMobilePage=true",
            "FRENCH": "https://teams.microsoft.com/l/meetup-join/19%3Ameeting_YTZlMmExOGItYmM2NS00MTUzLWFkMmUtNTQzN2QyZTc5ZTUw%40thread.v2/0?context=%7B%22Tid%22%3A%22eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%22%2C%22Oid%22%3A%226225bb49-d84d-44cc-818a-37b37128f6c9%22%7D",
            "ENGLISH/ME": "https://teams.microsoft.com/dl/launcher/launcher.html?url=%2F_%23%2Fl%2Fmeetup-join%2F19%3Ameeting_OTg0ODZmY2ItNmE4Yy00YzU3LWFiYzMtNDkzYzRhNDliOTlh%40thread.v2%2F0%3Fcontext%3D%257B%2522Tid%2522%253A%2522eec0f51a-03e0-4f84-8c0c-1f0c97d4cde8%2522%252C%2522Oid%2522%253A%2522289c9388-c1b1-4c07-896a-2372670634e3%2522%257D%26anon%3Dtrue&type=meetup-join&deeplinkId=5314b6ee-2df9-4645-8061-11784ab1f379&directDl=true&msLaunch=true&enableMobilePage=true&suppressPrompt=true"
        };

        const timetable = {
            Monday: [
                { start: "08:00", end: "08:45", name: "ENGLISH" },
                { start: "08:50", end: "09:35", name: "MATH" },
                { start: "09:40", end: "10:25", name: "SPECIAL ISLAMIC" },
                { start: "10:55", end: "11:40", name: "SCIENCE" },
                { start: "11:45", end: "12:30", name: "SPECIAL ARABIC" },
                { start: "12:35", end: "13:20", name: "P.E" }
            ],
            Tuesday: [
                { start: "08:00", end: "08:45", name: "MATH" },
                { start: "08:50", end: "09:35", name: "ENGLISH" },
                { start: "09:40", end: "10:25", name: "MATH" },
                { start: "10:55", end: "11:40", name: "SCIENCE" },
                { start: "11:45", end: "12:30", name: "SPECIAL ARABIC" },
                { start: "12:35", end: "13:20", name: "FRENCH" }
            ],
            Wednesday: [
                { start: "08:00", end: "08:45", name: "FRENCH" },
                { start: "08:50", end: "09:35", name: "ENGLISH" },
                { start: "09:40", end: "10:25", name: "SCIENCE" },
                { start: "10:55", end: "11:40", name: "MATH" },
                { start: "11:45", end: "12:30", name: "SPECIAL ARABIC" },
                { start: "12:35", end: "13:20", name: "SOCIAL STUDIES" }
            ],
            Thursday: [
                { start: "08:00", end: "08:45", name: "SCIENCE" },
                { start: "08:50", end: "09:35", name: "MATH" },
                { start: "09:40", end: "10:25", name: "ENGLISH" },
                { start: "10:55", end: "11:40", name: "SPECIAL ISLAMIC" },
                { start: "11:45", end: "12:30", name: "SPECIAL ARABIC" },
                { start: "12:35", end: "13:20", name: "ENGLISH/ME" }
            ],
            Friday: [
                { start: "07:45", end: "08:20", name: "SPECIAL ARABIC" },
                { start: "08:25", end: "09:00", name: "P.E" },
                { start: "09:05", end: "09:35", name: "SCIENCE" },
                { start: "09:45", end: "10:20", name: "MATH" },
                { start: "10:25", end: "10:55", name: "ENGLISH" },
                { start: "11:00", end: "11:30", name: "FRENCH" }
            ]
        };

        let currentActiveClassName = "";

        function joinActiveMeeting() {
            if (currentActiveClassName && links[currentActiveClassName]) {
                window.open(links[currentActiveClassName], '_blank');
            }
        }

        function updateUI() {
            const now = new Date();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayName = days[now.getDay()];
            const currentTime = now.getHours() * 60 + now.getMinutes();
            const currentSeconds = now.getSeconds();
            
            document.getElementById('clock').innerText = now.toLocaleTimeString();

            const statusLabel = document.getElementById('status-label');
            const classNameDisplay = document.getElementById('current-class');
            const joinBtn = document.getElementById('join-status');
            const timerBox = document.getElementById('timer-container');
            const card = document.getElementById('card-element');

            if (!timetable[dayName]) {
                statusLabel.innerText = "SYSTEM IDLE";
                classNameDisplay.innerText = "WEEKEND";
                joinBtn.style.display = 'none';
                currentActiveClassName = "";
                return;
            }

            const schedule = timetable[dayName];
            let active = null;
            let coming = null;

            for (const s of schedule) {
                const [sH, sM] = s.start.split(':').map(Number);
                const [eH, eM] = s.end.split(':').map(Number);
                const start = sH * 60 + sM;
                const end = eH * 60 + eM;

                if (currentTime >= start && currentTime < end) {
                    active = s; break;
                }
                if (start > currentTime) {
                    coming = s; break;
                }
            }

            if (active) {
                card.classList.remove('is-break');
                statusLabel.innerText = "CURRENT SESSION";
                classNameDisplay.innerText = active.name;
                currentActiveClassName = active.name;
                
                // Only show Join Class if a link exists
                if (links[active.name]) {
                    joinBtn.style.display = 'block';
                } else {
                    joinBtn.style.display = 'none';
                }
                timerBox.style.display = 'none';
            } else if (coming) {
                card.classList.add('is-break');
                statusLabel.innerText = "UP NEXT";
                classNameDisplay.innerText = "BREAK TIME";
                joinBtn.style.display = 'none';
                currentActiveClassName = "";
                timerBox.style.display = 'block';
                const [nH, nM] = coming.start.split(':').map(Number);
                const diff = (nH * 60 + nM) - currentTime - 1;
                timerBox.innerText = `${coming.name} IN ${diff}m ${60-currentSeconds}s`;
            } else {
                statusLabel.innerText = "STANDBY";
                classNameDisplay.innerText = "CLASSES ENDED";
                joinBtn.style.display = 'none';
                currentActiveClassName = "";
                timerBox.style.display = 'none';
            }
        }

        updateUI();
        setInterval(updateUI, 1000);
    </script>
</body>
</html>
