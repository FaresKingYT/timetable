    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- WEB APP PROMPT STYLE --- */
        #webapp-prompt {
            display: none;
            background: #050505;
            z-index: 1000;
        }

        .snack-card {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
        }

        .snack-card.selected {
            border-color: rgba(168, 85, 247, 0.5);
            background: #0e0e0e;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .king-gradient {
            background: linear-gradient(to right, #a855f7, #6b21a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cart-sidebar {
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            transform: translateX(100%);
            padding-bottom: var(--safe-bottom);
        }

        .cart-sidebar.open {
            transform: translateX(0);
        }

        .snack-shadow {
            filter: drop-shadow(0 20px 40px rgba(168, 85, 247, 0.3));
            transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            object-fit: contain;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .boba-adjust { transform: scale(2.2) translate(10px, 40px); }
        .selected .boba-adjust { transform: scale(2.3) translate(10px, 42px); }

        .tiger-milk-pos { transform: scale(1.8) translate(65px, 20px); }
        .selected .tiger-milk-pos { transform: scale(1.9) translate(70px, 20px); }

        .snack-card.selected .snack-shadow:not(.boba-adjust):not(.tiger-milk-pos) {
            transform: scale(1.15) translateY(-15px);
        }

        .image-container {
            height: 480px; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.03) 0%, transparent 70%);
        }

        #loader.fade-out { opacity: 0; pointer-events: none; }

        #toast {
            position: fixed;
            bottom: calc(2rem + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #a855f7;
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 200;
            box-shadow: 0 15px 40px rgba(168, 85, 247, 0.5);
            pointer-events: none;
            opacity: 0;
        }
        
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        nav { padding-top: calc(1rem + var(--safe-top)); }

        .tap-active:active { transform: scale(0.96); }

        @keyframes addEffect {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); filter: brightness(1.2); }
            100% { transform: scale(1); }
        }
        .item-added { animation: addEffect 0.4s ease-out; }
    </style>
</head>
<body>
    <!-- Web App Prompt (Shown when in regular browser) -->
    <div id="webapp-prompt" class="fixed inset-0 flex flex-col items-center justify-center p-10 text-center">
        <div class="relative mb-8">
            <div class="absolute inset-0 bg-purple-600 blur-[60px] opacity-20"></div>
            <img id="prompt-logo" src="" class="w-32 h-32 rounded-full object-cover border-2 border-purple-600 relative z-10 shadow-2xl">
        </div>
        <h2 class="text-4xl font-black italic uppercase tracking-tighter mb-4">USE WEB APP</h2>
        <p class="text-white/40 text-sm mb-8 leading-relaxed">To access the shop, add this site to your home screen for the full premium experience.</p>
        <div class="bg-white/5 border border-white/10 p-6 rounded-3xl flex items-center gap-4">
            <i class="fas fa-share-square text-purple-500 text-xl"></i>
            <p class="text-[10px] font-black uppercase tracking-widest text-left">Tap Share then<br><span class="text-white">"Add to Home Screen"</span></p>
        </div>
    </div>

    <!-- App Loading Screen -->
    <div id="loader" class="fixed inset-0 bg-[#050505] flex flex-col items-center justify-center z-[300] transition-opacity duration-1000">
        <div class="relative mb-8">
            <div class="absolute inset-0 bg-purple-600 blur-[80px] opacity-30 animate-pulse"></div>
            <img id="load-logo" src="" class="w-28 h-28 rounded-full object-cover border-2 border-purple-600 relative z-10 shadow-2xl">
        </div>
        <div class="space-y-2 text-center">
            <p class="text-purple-500 font-black tracking-[0.6em] text-[10px] uppercase italic animate-pulse">Loading…</p>
        </div>
    </div>

    <div id="toast">Added to bag</div>

    <!-- Main Content -->
    <div id="main-content">
        <nav class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-2xl border-b border-white/5 px-6 pb-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="nav-logo" src="" class="w-10 h-10 rounded-full object-cover border border-purple-600/30" alt="Fares King">
                <div>
                    <p class="text-[9px] text-purple-500 font-black uppercase tracking-widest mb-1">Supermarket</p>
                    <h1 class="font-black italic text-lg uppercase tracking-tighter leading-none">Fares King</h1>
                </div>
            </div>
            <button onclick="toggleCart()" class="w-12 h-12 bg-white/5 rounded-2xl relative border border-white/10 flex items-center justify-center tap-active transition-all">
                <i class="fas fa-shopping-bag text-lg"></i>
                <span id="cart-count" class="hidden absolute -top-1 -right-1 bg-purple-600 text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-black">0</span>
            </button>
        </nav>

        <main class="pt-32 pb-32">
            <header class="px-6 mb-12">
                <p class="text-white/30 text-[10px] font-black uppercase tracking-[0.4em] mb-2">Fares King's Premium Snacks</p>
                <h2 class="text-5xl font-black italic uppercase tracking-tighter leading-none">
                    OUR <span class="king-gradient">PRODUCTS</span>
                </h2>
            </header>
            <div id="snack-grid" class="px-4 space-y-8"></div>
        </main>
    </div>

    <!-- Sidebar / Cart -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden opacity-0 transition-opacity duration-500" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 w-full max-w-lg h-full bg-[#080808] z-[101] cart-sidebar flex flex-col shadow-2xl">
        <div class="pt-[calc(1.5rem+var(--safe-top))] p-8 flex justify-between items-center border-b border-white/5">
            <h2 class="font-black italic uppercase text-2xl tracking-tighter">Your Bag</h2>
            <button onclick="toggleCart()" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center tap-active"><i class="fas fa-times"></i></button>
        </div>

        <div id="cart-content-area" class="flex-grow overflow-y-auto p-6">
            <div id="cart-items" class="space-y-4"></div>
            <div id="checkout-fields" class="hidden space-y-6 pt-4">
                <div class="bg-white/5 p-6 rounded-[2rem] border border-white/5 space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-white/30 tracking-widest ml-1">Customer Name</label>
                        <input type="text" id="cust-name" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 outline-none focus:border-purple-600 font-bold transition-all text-white placeholder:text-white/10">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-white/30 tracking-widest ml-1">Grade / Section</label>
                        <input type="text" id="cust-grade" placeholder="e.g. 12-A" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 outline-none focus:border-purple-600 font-bold transition-all text-white placeholder:text-white/10">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-white/30 tracking-widest ml-1">Delivery Day</label>
                        <input type="text" id="cust-date" placeholder="When?" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 outline-none focus:border-purple-600 font-bold transition-all text-white placeholder:text-white/10">
                    </div>
                </div>
            </div>
        </div>

        <div class="p-8 pb-[calc(2rem+var(--safe-bottom))] bg-black border-t border-white/5">
            <div class="flex justify-between items-end mb-8 px-2">
                <span class="text-[10px] font-black uppercase text-white/20 tracking-widest">Grand Total</span>
                <span class="text-4xl font-black italic tracking-tighter text-purple-500" id="cart-total">0 AED</span>
            </div>
            <div class="space-y-4">
                <button id="step-btn" onclick="nextStep()" class="w-full py-6 bg-white text-black font-black uppercase italic tracking-widest rounded-[2rem] tap-active transition-all shadow-xl disabled:opacity-10">Checkout</button>
                <button id="final-btn" onclick="sendOrder()" class="hidden w-full py-6 bg-purple-600 text-white font-black uppercase italic tracking-widest rounded-[2rem] flex items-center justify-center gap-3 shadow-xl shadow-purple-600/40 tap-active transition-all">
                    Send Order <i class="fab fa-whatsapp text-lg"></i>
                </button>
                <button id="back-btn" onclick="prevStep()" class="hidden w-full py-2 text-[10px] font-black uppercase text-white/30 tracking-[0.3em]">Back to bag</button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_GROUP = "https://chat.whatsapp.com/H0lRM4emjMO4sVlsjyGGlq";
        const getDriveImg = (id) => `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;
        const LOGO_ID = "1jBkacG_Wj8_o7OcVYp6U1rjVb5iLts6I";
        const SPICY_POP_ID = "1BJGzA2GC_xCCeEvhirSg4Y8ht14skr-s";
        const BALANCED_POP_ID = "1I78L6Tv0T_-zTeQ2UUitxl8Dd_Pbm-sO";
        const TARO_BOBA_ID = "1xKAx3WvPkZQ8OHNMYWbNnpR2WpPpEsGy";
        const HOT_CHEETOS_ID = "1kD2YKFBd8n1vhVJjkP0h4JjqQ63zK0mZ";
        const TIGER_MILK_ID = "19o__91KB2EsotwLSIr0x63ygLdE0QhfR";

        const snacks = [
            { id: 1, name: "Tiger Fresh Milk", price: 20, img: getDriveImg(TIGER_MILK_ID), desc: "premium fresh milk with tiger sugar stripes and boba", isTiger: true },
            { id: 2, name: "Classic Boba Taro", price: 16, img: getDriveImg(TARO_BOBA_ID), desc: "Classic creamy taro with chewy boba pearls", isBoba: true },
            { id: 3, name: "Flaming Hot Cheetos", price: 6, img: getDriveImg(HOT_CHEETOS_ID), desc: "spicy crunchy chips" },
            { id: 4, name: "Spicy Popcorn", price: 4, img: getDriveImg(SPICY_POP_ID), desc: "spicy popcorn" },
            { id: 5, name: "Balanced Popcorn", price: 3, img: getDriveImg(BALANCED_POP_ID), desc: "popcorn" }
        ];

        let cart = [];

        function checkWebapp() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            if (!isStandalone) {
                document.getElementById('webapp-prompt').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('loader').style.display = 'none';
            } else {
                document.getElementById('webapp-prompt').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        }

        function renderGrid() {
            document.getElementById('snack-grid').innerHTML = snacks.map(s => `
                <div id="snack-${s.id}" onclick="handleCardClick(${s.id})" class="snack-card w-full bg-[#0c0c0c] border border-white/5 rounded-[3rem] overflow-hidden flex flex-col shadow-2xl">
                    <div class="image-container">
                        <img id="img-${s.id}" src="${s.img}" class="snack-shadow ${s.isBoba ? 'boba-adjust' : ''} ${s.isTiger ? 'tiger-milk-pos' : ''}" alt="${s.name}">
                        <div class="absolute top-8 left-8 bg-black/40 backdrop-blur-xl border border-white/10 px-5 py-2 rounded-2xl font-black italic text-xs tracking-tighter z-10">${s.price} AED</div>
                    </div>
                    <div class="p-8 flex-grow bg-[#0c0c0c]">
                        <h3 class="text-3xl font-black italic uppercase mb-2 tracking-tighter leading-tight">${s.name}</h3>
                        <p class="text-white/30 text-[10px] mb-8 italic uppercase tracking-wider font-bold max-w-xs">${s.desc}</p>
                        <button onclick="event.stopPropagation(); addToCart(${s.id})" class="w-full py-5 bg-white text-black font-black uppercase italic tracking-[0.2em] text-[10px] rounded-2xl tap-active transition-all shadow-xl">Add To Bag</button>
                    </div>
                </div>
            `).join('');
        }

        function handleCardClick(id) {
            document.querySelectorAll('.snack-card').forEach(el => el.classList.remove('selected'));
            const target = document.getElementById(`snack-${id}`);
            if(target) target.classList.add('selected');
        }

        function addToCart(id) {
            const item = snacks.find(s => s.id === id);
            const exists = cart.find(c => c.id === id);
            const cardEl = document.getElementById(`snack-${id}`);
            cardEl.classList.add('item-added');
            setTimeout(() => cardEl.classList.remove('item-added'), 400);
            if (exists) exists.qty++;
            else cart.push({...item, qty: 1});
            updateUI();
            const toast = document.getElementById('toast');
            toast.innerText = "Added to bag";
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
            handleCardClick(id);
        }

        function changeQty(id, delta) {
            const item = cart.find(c => c.id === id);
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            let total = 0;
            let count = 0;
            list.innerHTML = cart.length === 0 ? '<div class="py-20 text-center opacity-10 font-black uppercase text-[10px] italic tracking-[0.5em]">Your bag is empty</div>' : 
                cart.map(c => {
                    total += (c.price * c.qty);
                    count += c.qty;
                    return `<div class="flex gap-4 items-center bg-white/[0.03] p-5 rounded-[2rem] border border-white/5"><div class="w-16 h-16 bg-neutral-900 rounded-2xl flex items-center justify-center p-2"><img src="${c.img}" class="max-w-full max-h-full object-contain"></div><div class="flex-grow"><h4 class="font-black italic uppercase text-[10px] mb-0.5 tracking-tight">${c.name}</h4><p class="text-purple-500 font-black text-xs">${c.price * c.qty} AED</p></div><div class="flex items-center gap-3"><button onclick="changeQty(${c.id},-1)" class="w-8 h-8 bg-white/5 rounded-xl flex items-center justify-center tap-active"><i class="fas fa-minus text-[8px]"></i></button><span class="text-xs font-black w-4 text-center">${c.qty}</span><button onclick="changeQty(${c.id},1)" class="w-8 h-8 bg-white/5 rounded-xl flex items-center justify-center tap-active"><i class="fas fa-plus text-[8px]"></i></button></div></div>`;
                }).join('');
            totalEl.innerText = `${total} AED`;
            countEl.innerText = count;
            countEl.classList.toggle('hidden', count === 0);
            document.getElementById('step-btn').disabled = cart.length === 0;
        }

        function sendOrder() {
            const name = document.getElementById('cust-name').value || "Customer";
            const grade = document.getElementById('cust-grade').value || "N/A";
            const date = document.getElementById('cust-date').value || "ASAP";
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const itemsMsg = cart.map(c => `• ${c.name} (x${c.qty})`).join('%0A');
            
            const text = `👑 *FARES KING ORDER*%0A--------------------------%0A👤 *NAME:* ${name}%0A📍 *GRADE:* ${grade}%0A📅 *DATE:* ${date}%0A--------------------------%0A📦 *ITEMS:*%0A${itemsMsg}%0A%0A💰 *TOTAL:* ${total} AED`;
            
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text.replace(/%0A/g, '\n');
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);

            const toast = document.getElementById('toast');
            toast.innerText = "Order copied! Paste in group.";
            toast.classList.add('show');
            
            setTimeout(() => {
                window.open(WHATSAPP_GROUP, '_top');
            }, 1000);
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            if (!sidebar.classList.contains('open')) {
                sidebar.classList.add('open');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.style.opacity = '1', 10);
            } else {
                sidebar.classList.remove('open');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 500);
                prevStep();
            }
        }

        function nextStep() {
            document.getElementById('cart-items').classList.add('hidden');
            document.getElementById('checkout-fields').classList.remove('hidden');
            document.getElementById('step-btn').classList.add('hidden');
            document.getElementById('final-btn').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
        }

        function prevStep() {
            document.getElementById('cart-items').classList.remove('hidden');
            document.getElementById('checkout-fields').classList.add('hidden');
            document.getElementById('step-btn').classList.remove('hidden');
            document.getElementById('final-btn').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
        }

        window.onload = () => {
            checkWebapp();
            const img = getDriveImg(LOGO_ID);
            document.getElementById('nav-logo').src = img;
            document.getElementById('load-logo').src = img;
            document.getElementById('prompt-logo').src = img;
            renderGrid();
            setTimeout(() => {
                document.getElementById('loader').classList.add('fade-out');
            }, 1500);
        };
    </script>
</body>
</html>
