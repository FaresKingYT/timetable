```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fares King | The Plug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }
        .king-gradient {
            background: linear-gradient(to right, #a855f7, #6b21a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .cart-sidebar {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        .cart-sidebar.open {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <!-- Background Glow -->
    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-2xl h-[40vh] bg-purple-600/10 blur-[120px] pointer-events-none -z-10"></div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="https://api.a0.dev/assets/image?url=uploaded:image.png-055cb59e-1c43-4443-87bd-5bed14df3bfd" class="w-10 h-10 rounded-lg object-cover border border-purple-600/30" alt="Logo">
            <h1 class="font-black italic text-xl uppercase tracking-tighter">Fares King</h1>
        </div>
        <button onclick="toggleCart()" class="p-3 bg-white/5 rounded-2xl relative border border-white/10 active:scale-95 transition-all">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count" class="hidden absolute -top-1 -right-1 bg-purple-600 text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-black">0</span>
        </button>
    </nav>

    <!-- Header -->
    <header class="pt-32 pb-12 px-6 text-center">
        <h2 class="text-7xl md:text-8xl font-black italic uppercase tracking-tighter mb-2 leading-none">
            THE <span class="king-gradient">VAULT</span>
        </h2>
        <p class="text-white/30 text-[10px] font-black uppercase tracking-[0.4em]">Official Snack Catalog</p>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-6 pb-32" id="snack-grid">
        <!-- Snacks will be injected here -->
    </main>

    <!-- Cart Sidebar -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden opacity-0 transition-opacity duration-300" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 w-full max-w-md h-full bg-[#080808] border-l border-white/10 z-[101] cart-sidebar flex flex-col">
        <div class="p-6 flex justify-between items-center border-b border-white/5 bg-black">
            <h2 class="font-black italic uppercase text-xl">Your Bag</h2>
            <button onclick="toggleCart()" class="p-2 bg-white/5 rounded-xl"><i class="fas fa-times"></i></button>
        </div>

        <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4">
            <!-- Cart items injected here -->
        </div>

        <div id="checkout-form" class="hidden p-6 space-y-4 border-t border-white/5 bg-black">
            <h3 class="font-black uppercase text-xs text-purple-500 tracking-widest">Delivery Details</h3>
            <input type="text" id="cust-name" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-5 outline-none focus:border-purple-600 font-bold">
            <input type="text" id="cust-grade" placeholder="Grade / Section (e.g. 10-A)" class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-5 outline-none focus:border-purple-600 font-bold">
            <input type="text" id="cust-date" placeholder="Delivery Date (e.g. Monday)" class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-5 outline-none focus:border-purple-600 font-bold">
        </div>

        <div class="p-6 bg-black border-t border-white/5">
            <div class="flex justify-between items-end mb-6">
                <span class="text-[10px] font-black uppercase text-white/20">Total</span>
                <span class="text-4xl font-black italic" id="cart-total">0 AED</span>
            </div>
            <button id="next-btn" onclick="goToDetails()" class="w-full py-5 bg-white text-black font-black uppercase italic tracking-widest rounded-2xl active:scale-95 transition-all shadow-xl">
                Next Step
            </button>
            <a id="whatsapp-btn" href="#" target="_top" class="hidden w-full py-5 bg-purple-600 text-white font-black uppercase italic tracking-widest rounded-2xl flex items-center justify-center gap-2 shadow-xl shadow-purple-600/30 active:scale-95 transition-all">
                Send Order <i class="fas fa-paper-plane"></i>
            </a>
            <button id="back-btn" onclick="goToReview()" class="hidden w-full mt-3 text-[10px] font-black uppercase text-white/20 tracking-widest">Go Back</button>
        </div>
    </div>

    <footer class="py-20 flex flex-col items-center gap-6 border-t border-white/5 mt-10">
        <i class="fas fa-star text-purple-600 animate-pulse"></i>
        <h2 class="text-xl font-black italic uppercase opacity-20">@FaresKingYT</h2>
    </footer>

    <script>
        const WHATSAPP_NUM = "971558597737";
        const snacks = [
            { id: 1, name: "Spicy Popcorn", price: 4, img: "https://api.a0.dev/assets/image?url=uploaded:image.png-9275fc42-2cee-475b-ba17-533f74aed030", desc: "Signature elite heat." },
            { id: 2, name: "Balanced Popcorn", price: 3, img: "https://api.a0.dev/assets/image?url=uploaded:image.png-2fd90d04-2a01-4bf5-9f9b-186bb5283c18", desc: "Perfect spice/salt ratio." },
            { id: 3, name: "Cheetos Flamin' Hot", price: 5, img: "https://api.a0.dev/assets/image?url=uploaded:1777727762790.jpeg-d08ecd22-f137-404f-b789-9fbc0d500b58", desc: "Classic crunch plug." }
        ];

        let cart = [];

        function renderGrid() {
            const grid = document.getElementById('snack-grid');
            grid.innerHTML = snacks.map(s => `
                <div class="bg-[#0c0c0c] border border-white/5 rounded-[2.5rem] overflow-hidden flex flex-col">
                    <div class="h-64 bg-neutral-900 flex items-center justify-center p-8 relative">
                        <img src="${s.img}" class="max-w-full max-h-full object-contain" alt="${s.name}">
                        <div class="absolute top-6 right-6 bg-purple-600 px-4 py-1.5 rounded-xl font-black italic text-sm">${s.price} AED</div>
                    </div>
                    <div class="p-8">
                        <h3 class="text-2xl font-black italic uppercase mb-2 tracking-tighter">${s.name}</h3>
                        <p class="text-white/40 text-[11px] mb-6 italic">${s.desc}</p>
                        <button onclick="addToCart(${s.id})" class="w-full py-4 bg-white text-black font-black uppercase italic tracking-widest text-[10px] rounded-2xl active:scale-95 transition-all">Add to Bag</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = snacks.find(s => s.id === id);
            const inCart = cart.find(c => c.id === id);
            if (inCart) inCart.qty++;
            else cart.push({...item, qty: 1});
            updateCartUI();
            toggleCart(true);
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            
            let total = 0;
            let count = 0;

            list.innerHTML = cart.length === 0 ? '<div class="py-20 text-center opacity-10 font-black uppercase text-[10px]">Empty</div>' : 
                cart.map(c => {
                    total += (c.price * c.qty);
                    count += c.qty;
                    return `
                        <div class="flex gap-4 items-center bg-white/[0.03] p-4 rounded-3xl border border-white/5">
                            <img src="${c.img}" class="w-12 h-12 object-contain bg-neutral-800 rounded-xl p-2">
                            <div class="flex-grow">
                                <h4 class="font-black italic uppercase text-[10px]">${c.name}</h4>
                                <p class="text-purple-500 font-black text-xs">${c.price * c.qty} AED</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="changeQty(${c.id}, -1)" class="w-6 h-6 bg-white/5 rounded-lg">-</button>
                                <span class="text-xs font-bold">${c.qty}</span>
                                <button onclick="changeQty(${c.id}, 1)" class="w-6 h-6 bg-white/5 rounded-lg">+</button>
                            </div>
                        </div>
                    `;
                }).join('');

            totalEl.innerText = `${total} AED`;
            countEl.innerText = count;
            countEl.classList.toggle('hidden', count === 0);
            updateWhatsAppLink(total);
        }

        function changeQty(id, delta) {
            const item = cart.find(c => c.id === id);
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
            updateCartUI();
        }

        function toggleCart(forceOpen = false) {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            const isOpen = sidebar.classList.contains('open');

            if (forceOpen || !isOpen) {
                sidebar.classList.add('open');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.style.opacity = '1', 10);
            } else {
                sidebar.classList.remove('open');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function goToDetails() {
            if (cart.length === 0) return;
            document.getElementById('cart-items').classList.add('hidden');
            document.getElementById('checkout-form').classList.remove('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('whatsapp-btn').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
        }

        function goToReview() {
            document.getElementById('cart-items').classList.remove('hidden');
            document.getElementById('checkout-form').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            document.getElementById('whatsapp-btn').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
        }

        function updateWhatsAppLink(total) {
            const btn = document.getElementById('whatsapp-btn');
            const name = document.getElementById('cust-name').value || "Customer";
            const grade = document.getElementById('cust-grade').value || "Not specified";
            const date = document.getElementById('cust-date').value || "ASAP";
            
            const items = cart.map(c => `• ${c.name} (x${c.qty})`).join('%0A');
            const text = `👑 *NEW ORDER: FARES KING*%0A--------------------------%0A👤 *NAME:* ${name}%0A📍 *GRADE:* ${grade}%0A📅 *DATE:* ${date}%0A--------------------------%0A📦 *ITEMS:*%0A${items}%0A%0A💰 *TOTAL:* ${total} AED`;
            
            btn.href = `https://wa.me/${WHATSAPP_NUM}?text=${text}`;
        }

        // Keep WhatsApp link updated as they type
        ['cust-name', 'cust-grade', 'cust-date'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                const total = cart.reduce((s, c) => s + (c.price * c.qty), 0);
                updateWhatsAppLink(total);
            });
        });

        renderGrid();
    </script>
</body>
</html>

```
