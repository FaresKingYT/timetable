/* ── BOOT ── */
async function bootApp(){
  if(!window.FK_DB) await new Promise(r=>{window.addEventListener("fk-ready",r,{once:true});});
  try{
    const settings=await window.FK_DB.getSettings();
    if(settings.waLink) GROUP_LINK=settings.waLink;
    if(settings.ytLink) YT=settings.ytLink;
    if(settings.siteDown){
      const msg=settings.siteDownMsg||"The shop is temporarily closed. Check back later.";
      document.getElementById("site-down-msg").textContent=msg;
      document.getElementById("site-down-overlay").style.display="flex";
      /* Still set up tap zone for admin access even when site is down */
      setupTapZone();
      return;
    }
    const remote=await window.FK_DB.getProducts();
    if(remote&&remote.length>0) SNACKS=remote;
  }catch(e){ console.warn("Settings load failed",e); }

  const app=document.getElementById("app");
  app.style.display="block";
  app.classList.add("entering");
  buildApp();
  setupTapZone();

  window.FK_AUTH.onAuth(user=>{ _adminUser=user; });
}

/* ── TAP ZONE — set up once, always works ── */
function setupTapZone(){
  const zone=document.getElementById("tap-zone");
  if(!zone) return;
  zone.addEventListener("touchend",handleAdminTap,{passive:true});
  zone.addEventListener("click",handleAdminTap);
}
function handleAdminTap(){
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer=setTimeout(()=>{ tapCount=0; },1000);
  if(tapCount>=4){
    tapCount=0;
    openAdminSignin();
  }
}

  }
  /* Build sign-in screen if not already there */
  let screen=document.getElementById("admin-signin-screen");
  if(!screen){
    screen=document.createElement("div");
    screen.id="admin-signin-screen";
    screen.style.cssText="position:fixed;inset:0;z-index:9990;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;";
    screen.innerHTML=`
      <div style="width:64px;height:64px;border-radius:18px;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
        <i class="fas fa-shield-halved" style="color:#a855f7;font-size:1.4rem;"></i>
      </div>
      <h3 style="font-family:'Archivo Black',sans-serif;font-size:22px;text-transform:uppercase;letter-spacing:-0.03em;margin-bottom:8px;">Admin Access</h3>

        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
      <p id="admin-signin-err" style="color:#f87171;font-size:12px;margin-top:14px;text-align:center;display:none;max-width:260px;"></p>
      <button onclick="closeAdminSignin()" style="margin-top:16px;background:none;border:none;color:rgba(255,255,255,.25);font-size:13px;cursor:pointer;font-family:Inter,sans-serif;">Cancel</button>
    `;
    document.body.appendChild(screen);
  }
  screen.style.display="flex";
}
function closeAdminSignin(){
  const s=document.getElementById("admin-signin-screen");
  if(s) s.style.display="none";
}
async function doAdminSignIn(){
  const err=document.getElementById("admin-signin-err");
  err.style.display="none";
  try{
    const user=await window.FK_AUTH.signInGoogle();
    if(!window.FK_AUTH.isAdmin(user)){
      await window.FK_AUTH.signOut();
      err.textContent="Access denied — this account is not authorised.";
      err.style.display="block";
      return;
    }
    _adminUser=user;
    closeAdminSignin();
    openAdmin();
  }catch(e){
    err.textContent="Sign in failed. Make sure popups are allowed and try again.";
    err.style.display="block";
  }
}
async function doAdminSignOut(){
  await window.FK_AUTH.signOut();
  _adminUser=null;
  closeAdmin();
  showToast("Signed out");
}

function closeAdmin(){
  const p=document.getElementById("admin-panel");
  if(p) p.style.display="none";
}

function admTab(name){
  const t=THEMES[currentTheme]||THEMES.purple;
  ["orders","products","themes","settings"].forEach(n=>{
    const btn=document.getElementById("atb-"+n);
    if(!btn)return;
    const active=n===name;
    btn.style.color=active?t.accent:"rgba(255,255,255,.3)";
    btn.style.borderBottom=active?`2px solid ${t.accent}`:"2px solid transparent";
  });
  const c=document.getElementById("adm-content");
  if(!c)return;
  if(name==="orders")   renderAdmOrders(c);
  if(name==="products") renderAdmProducts(c);
  if(name==="themes")   renderAdmThemes(c);
  if(name==="settings") renderAdmSettings(c);
}

/* ORDERS TAB */
async function loadAdminOrders(){
  const c=document.getElementById("adm-content");
  if(c) c.innerHTML=`<div style="text-align:center;padding:60px 20px;"><i class="fas fa-spinner fa-spin" style="color:#a855f7;font-size:1.5rem;"></i></div>`;
  try{
    adminOrders=await window.FK_DB.getAllOrders();
    const curTab=document.querySelector("#adm-tabs button[style*='border-bottom: 2px solid #']")||document.getElementById("atb-orders");
    if(curTab&&curTab.id==="atb-orders") renderAdmOrders(document.getElementById("adm-content"));
  }catch(e){ if(c) c.innerHTML=`<p style="text-align:center;color:rgba(255,255,255,.25);padding:40px;">Failed to load</p>`; }
}
function renderAdmOrders(c){
  if(!c)return;
  const pend=adminOrders.filter(o=>o.status!=="complete").length;
  const rev=adminOrders.filter(o=>o.status==="complete").reduce((s,o)=>s+(o.total||0),0);
  c.innerHTML=`
    <div style="padding:14px 16px;">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;">
        <div style="background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.15);border-radius:14px;padding:12px;text-align:center;">
          <p style="font-family:'Archivo Black',sans-serif;font-size:22px;">${adminOrders.length}</p>
          <p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">TOTAL</p>
        </div>
        <div style="background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.15);border-radius:14px;padding:12px;text-align:center;">
          <p style="font-family:'Archivo Black',sans-serif;font-size:22px;color:#fbbf24;">${pend}</p>
          <p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">PENDING</p>
        </div>
        <div style="background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.15);border-radius:14px;padding:12px;text-align:center;">
          <p style="font-family:'Archivo Black',sans-serif;font-size:16px;color:#22c55e;">AED ${rev}</p>
          <p style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.08em;">REVENUE</p>
        </div>

function filterAdmOrders(){
  const search=(document.getElementById("adm-search")?.value||"").toLowerCase();
  const filter=document.getElementById("adm-filter")?.value||"all";
  let list=adminOrders;
  if(filter!=="all") list=list.filter(o=>o.status===filter);
  if(search) list=list.filter(o=>(o.id||"").toLowerCase().includes(search)||(o.customer?.name||"").toLowerCase().includes(search)||(o.customer?.grade||"").toLowerCase().includes(search));
  const el=document.getElementById("adm-orders-list");
  if(!el)return;
  if(!list.length){el.innerHTML=`<p style="text-align:center;color:rgba(255,255,255,.2);font-size:13px;padding:32px 0;">No orders found</p>`;return;}
  el.innerHTML=list.map(o=>{
    const ts=o.created?.seconds?o.created.seconds*1000:(o.created||Date.now());
    const ds=new Date(ts).toLocaleDateString("en-AE",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
    const its=(o.items||[]).map(i=>`${i.name}×${i.qty}`).join(", ");
    const done=o.status==="complete";
    return `<div style="border-radius:14px;border:1px solid ${done?"rgba(34,197,94,.2)":"rgba(255,255,255,.08)"};background:${done?"rgba(34,197,94,.02)":"rgba(255,255,255,.015)"};padding:13px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
        <div>
          <p style="font-size:11px;font-weight:900;color:#a855f7;">#${(o.id||"").substring(0,14)}</p>
          <p style="font-weight:800;font-size:14px;margin-top:2px;">${o.customer?.name||"Unknown"}</p>
        </div>
        <div style="text-align:right;">
          <span style="font-size:10px;font-weight:900;padding:2px 10px;border-radius:100px;${done?"background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3);":"background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25);"}">${(o.status||"pending").toUpperCase()}</span>
          <p style="font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;">${ds}</p>
        </div>
      </div>
      <p style="font-size:12px;color:rgba(255,255,255,.35);">${o.customer?.grade||""} · ${o.customer?.date||""}</p>
      <p style="font-size:11px;color:rgba(255,255,255,.2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${its}</p>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
        <span style="font-weight:900;color:#a855f7;font-size:14px;">AED ${o.total||0}</span>
        <div style="display:flex;gap:7px;">
          ${!done?`<button onclick="admMarkDone('${o.id}')" style="background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.28);border-radius:10px;padding:6px 12px;color:#22c55e;font-size:11px;font-weight:800;cursor:pointer;font-family:Inter,sans-serif;">✓ Complete</button>`:`<span style="font-size:11px;color:rgba(34,197,94,.5);">✓ Done</span>`}
          <button onclick="admDeleteOrder('${o.id}')" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:6px 10px;color:#f87171;font-size:11px;cursor:pointer;">🗑</button>
        </div>
      </div>
    </div>`;
  }).join("");
}
async function admMarkDone(id){

async function saveProductModal(){
  const name=document.getElementById("pm-name").value.trim();
  const price=parseFloat(document.getElementById("pm-price").value)||0;
  const desc=document.getElementById("pm-desc").value.trim();
  const img=document.getElementById("pm-img").value.trim();
  const cat=document.getElementById("pm-cat").value;
  if(!name||!price||!img){showToast("Fill in all fields");return;}
  if(_editProdId){
    const s=SNACKS.find(x=>x.id===_editProdId);
    if(s){s.name=name;s.price=price;s.desc=desc;s.img=img;s.category=cat;}
  } else {
    SNACKS.push({id:Math.max(0,...SNACKS.map(s=>s.id))+1,name,price,desc,img,category:cat});
  }
  try{await window.FK_DB.saveProducts(SNACKS);}catch(e){console.warn(e);}
  document.getElementById("prod-modal").style.display="none";
  renderProducts(currentFilter);
  renderAdmProducts(document.getElementById("adm-content"));
  showToast(_editProdId?"Product updated!":"Product added!");
}
async function admDeleteProduct(id){
  if(!confirm("Remove this product?"))return;
  SNACKS=SNACKS.filter(s=>s.id!==id);
  try{await window.FK_DB.saveProducts(SNACKS);}catch(e){}
  renderProducts(currentFilter);
  renderAdmProducts(document.getElementById("adm-content"));
  showToast("Product removed");
}

function selectSnack(id){

/* ── CART ── */
function getQty(id){const i=cart.find(x=>x.id===id);return i?i.qty:0;}
function cartTotal(){return cart.reduce((s,i)=>s+i.price*i.qty,0);}
function cartCount(){return cart.reduce((s,i)=>s+i.qty,0);}
function addToCart(id){
  const s=SNACKS.find(x=>x.id===id);if(!s)return;
  const e=cart.find(x=>x.id===id);if(e)e.qty++;else cart.push({...s,qty:1});
  saveCart();updateCartUI();updateCardControls(id);showToast(`${s.name} added!`);
}
function changeQty(id,d){
  const i=cart.find(x=>x.id===id);if(!i)return;
  i.qty=Math.max(0,i.qty+d);if(i.qty===0)cart=cart.filter(x=>x.id!==id);
  saveCart();updateCartUI();updateCardControls(id);renderCartItems();
}
function updateCardControls(id){
  const card=document.getElementById("card-"+id);if(!card)return;
  const s=SNACKS.find(x=>x.id===id);if(!s)return;
  const qty=getQty(id);
  const ctrl=card.querySelector(".flex.items-center.justify-between.mt-3");if(!ctrl)return;
  ctrl.innerHTML=qty===0
    ?`<button onclick="event.stopPropagation();addToCart(${id})" class="shiny-wrap tap-active px-5 py-2.5 rounded-full text-white font-black text-xs uppercase tracking-wider" style="background:linear-gradient(135deg,#a855f7,#6b21a8)">Add to Bag</button>`
    :`<div class="flex items-center gap-3" onclick="event.stopPropagation()"><button onclick="changeQty(${id},-1)" class="w-8 h-8 rounded-full bg-white/8 flex items-center justify-center font-black text-base tap-active">−</button><span class="font-black text-base">${qty}</span><button onclick="changeQty(${id},1)" class="w-8 h-8 rounded-full flex items-center justify-center font-black text-base tap-active" style="background:linear-gradient(135deg,#a855f7,#6b21a8)">+</button></div><span class="text-white/25 text-xs">AED ${s.price*qty}</span>`;
}
function saveCart(){localStorage.setItem("fk_cart",JSON.stringify(cart));}
function updateCartUI(){
  const n=cartCount(),t=cartTotal();
  const b=document.getElementById("cart-badge");if(b){b.textContent=n;b.classList.toggle("hidden",n===0);}
  const ct=document.getElementById("cart-total-txt");if(ct)ct.textContent="AED "+t;
  const cc=document.getElementById("cart-count-txt");if(cc)cc.textContent=n+(n===1?" item":" items");
}
function renderCartItems(){
  const el=document.getElementById("cart-items");if(!el)return;
  if(!cart.length){el.innerHTML=`<p class="text-center text-white/20 text-sm py-12">Your bag is empty</p>`;return;}
  el.innerHTML=cart.map(i=>`<div class="flex items-center gap-3 py-3 border-b border-white/5">
    <img src="${i.img}" class="w-12 h-12 rounded-2xl object-contain bg-purple-900/10 border border-white/5" loading="lazy">
    <div class="flex-1 min-w-0"><p class="font-black text-sm truncate">${i.name}</p><p class="text-purple-400 text-xs mt-0.5">AED ${i.price}</p></div>
    <div class="flex items-center gap-2">
      <button onclick="changeQty(${i.id},-1)" class="w-7 h-7 rounded-full bg-white/8 flex items-center justify-center text-sm font-black tap-active">−</button>
      <span class="font-black text-sm w-4 text-center">${i.qty}</span>
      <button onclick="changeQty(${i.id},1)" class="w-7 h-7 rounded-full flex items-center justify-center text-sm font-black tap-active" style="background:linear-gradient(135deg,#a855f7,#6b21a8)">+</button>
    </div>
  </div>`).join("");
}
function openCart(){renderCartItems();document.getElementById("cart-overlay").classList.remove("hidden");setTimeout(()=>document.getElementById("cart-panel").classList.add("open"),10);}
function closeCart(){document.getElementById("cart-panel").classList.remove("open");setTimeout(()=>document.getElementById("cart-overlay").classList.add("hidden"),500);}

/* ── CHECKOUT ── */
function showMain(){document.getElementById("main-view").style.display="block";document.getElementById("checkout-view").style.display="none";}
function goCheckout(){
  if(!cart.length){showToast("Your bag is empty!");return;}
  closeCart();
  document.getElementById("co-summary").innerHTML=cart.map(i=>`<div class="flex justify-between text-sm py-0.5"><span class="text-white/60">${i.name} ×${i.qty}</span><span class="font-bold">AED ${i.price*i.qty}</span></div>`).join("")+`<div class="border-t border-white/10 mt-2 pt-2 flex justify-between"><span class="text-white/40 text-sm">Total</span><span class="font-black text-purple-400">AED ${cartTotal()}</span></div>`;
  document.getElementById("co-total").textContent="AED "+cartTotal();
  document.getElementById("f-date").value=new Date().toISOString().split("T")[0];
  const saved=localStorage.getItem("fk_last_info");
  if(saved) document.getElementById("prefill-banner").classList.remove("hidden");
  document.getElementById("main-view").style.display="none";
  document.getElementById("checkout-view").style.display="block";
  window.scrollTo(0,0);
}
function useSavedInfo(){
  try{
    const info=JSON.parse(localStorage.getItem("fk_last_info")||"{}");
    document.getElementById("f-name").value=info.name||"";
    document.getElementById("f-grade").value=info.grade||"";
    document.getElementById("prefill-banner").classList.add("hidden");
    showToast("Info filled in!");
  }catch(e){}
}
async function placeOrder(){
  const name=(document.getElementById("f-name").value||"").trim();
  const grade=(document.getElementById("f-grade").value||"").trim();
  const date=(document.getElementById("f-date").value||"").trim();
  let ok=true;
  const setE=(id,show)=>{document.getElementById("e-"+id).classList.toggle("hidden",!show);if(show)ok=false;};
  setE("name",!name);setE("grade",!grade);setE("date",!date);
  if(!ok)return;
  const btn=document.getElementById("place-btn");
  btn.disabled=true;btn.innerHTML=`<i class="fas fa-spinner fa-spin mr-2"></i>Placing Order...`;
  localStorage.setItem("fk_last_info",JSON.stringify({name,grade}));
  const orderData={customer:{name,grade,date},items:cart.map(i=>({id:i.id,name:i.name,price:i.price,qty:i.qty})),total:cartTotal(),status:"pending",created:Date.now()};
  try{
    if(!window.FK_DB)await new Promise(r=>{window.addEventListener("fk-ready",r,{once:true});});
    const orderId=await window.FK_DB.saveOrder(orderData);
    const full={...orderData,id:orderId};
    localStorage.setItem("fk_last_order",orderId);
    localStorage.setItem("fk_order_"+orderId,JSON.stringify(full));
    cart=[];saveCart();updateCartUI();
    btn.disabled=false;btn.innerHTML="Place Order";
    openShareModal(full);
  }catch(err){
    console.error(err);btn.disabled=false;btn.innerHTML="Place Order";
    showToast("Order failed — check connection");
  }
}

/* ── SHARE ── */
function receiptUrl(id){return location.origin+location.pathname.replace(/\/[^/]*$/,"/")+`receipt.html?orderId=${id}`;}
function buildMsg(o){
  const items=o.items.map(i=>`  • ${i.name} ×${i.qty}  —  AED ${i.price*i.qty}`).join("\n");
  return `🛍️ *NEW ORDER — Fares King*\n\n🆔 *${o.id}*\n👤 ${o.customer.name}\n🎓 ${o.customer.grade}\n📅 ${o.customer.date}\n\n🛒 Items:\n${items}\n\n💰 *Total: AED ${o.total}*\n\n🧾 Receipt: ${receiptUrl(o.id)}`;
}
function openShareModal(o){
  _pendingOrder=o;
  document.getElementById("share-preview").textContent=buildMsg(o);
  document.getElementById("share-modal").classList.remove("hidden");
  setTimeout(()=>document.getElementById("share-sheet").classList.remove("translate-y-full"),10);
  try{navigator.clipboard.writeText(receiptUrl(o.id));}catch(e){}
}
function closeShareModal(){
  document.getElementById("share-sheet").classList.add("translate-y-full");
  setTimeout(()=>{document.getElementById("share-modal").classList.add("hidden");if(_pendingOrder)location.href="receipt.html?orderId="+_pendingOrder.id;},420);
}
function sendToWhatsApp(){
  if(!_pendingOrder)return;
  window.open("https://wa.me/?text="+encodeURIComponent(buildMsg(_pendingOrder)),"_blank");
  closeShareModal();
}

/* ── LOOKUP ── */
function openOrderLookup(){const last=localStorage.getItem("fk_last_order");if(last)document.getElementById("lookup-inp").value=last;document.getElementById("lookup-modal").classList.remove("hidden");}
function closeLookup(){document.getElementById("lookup-modal").classList.add("hidden");}
function doLookup(){
  const id=(document.getElementById("lookup-inp").value||"").trim();
  const err=document.getElementById("lookup-err");
  if(!id){err.textContent="Please enter an Order ID";err.classList.remove("hidden");return;}
  err.classList.add("hidden");closeLookup();location.href="receipt.html?orderId="+id;
}

/* ── TOAST ── */
let _tt;
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove("show"),2200);}
</script>
</body>
</html>
