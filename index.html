import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey:            "AIzaSyC5ak05F3SMU5rhYSbpK0Ybk1nViFwMP6M",

  projectId:         "fares-f0707",
  storageBucket:     "fares-f0707.firebasestorage.app",

  appId:             "1:1067301824307:web:d92582a1371e099f3b8046",
  measurementId:     "G-RQ0QZ0QYXR"
};

const fbApp  = initializeApp(firebaseConfig);
try{ getAnalytics(fbApp); }catch(e){}
const db     = getFirestore(fbApp);
const auth   = getAuth(fbApp);
const gProvider = new GoogleAuthProvider();

/* ── Allowed admin email ── */
const ADMIN_EMAIL = "narisaidova@gmail.com";

window.FK_DB = {
  async saveOrder(data){
    const ref = await addDoc(collection(db,"orders"),{...data,created:serverTimestamp(),status:"pending"});
    return ref.id;
  },
  async getOrder(id){
    const snap = await getDoc(doc(db,"orders",id));
    return snap.exists()?{id:snap.id,...snap.data()}:null;
  },
  async getAllOrders(){
    const q = query(collection(db,"orders"),orderBy("created","desc"));
    const snap = await getDocs(q);
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  },
  async markComplete(id){ await updateDoc(doc(db,"orders",id),{status:"complete"}); },
  async deleteOrder(id){ await deleteDoc(doc(db,"orders",id)); },

  /* Settings: siteDown, waLink, custom message */
  async getSettings(){
    try{
      const snap = await getDoc(doc(db,"config","settings"));
      return snap.exists()?snap.data():{};
    }catch(e){ return {}; }
  },
  async saveSettings(data){ await setDoc(doc(db,"config","settings"),data,{merge:true}); },

  /* Products in Firestore */
  async getProducts(){
    try{
      const snap = await getDoc(doc(db,"config","products"));
      return snap.exists()?snap.data().list:null;
    }catch(e){ return null; }
  },
  async saveProducts(list){ await setDoc(doc(db,"config","products"),{list}); },
};

window.FK_AUTH = {
  async signInGoogle(){
    const result = await signInWithPopup(auth, gProvider);
    return result.user;
  },
  async signOut(){ await signOut(auth); },
  onAuth(cb){ return onAuthStateChanged(auth, cb); },
  isAdmin(user){ return user && user.email === ADMIN_EMAIL; }
};

window.dispatchEvent(new Event("fk-ready"));
</script>

/* ── BOOT: load settings & products from Firebase, then show app ── */
async function bootApp(){
  /* Wait for firebase to be ready */
  if(!window.FK_DB) await new Promise(r=>{window.addEventListener("fk-ready",r,{once:true});});

  try{
    /* Load settings */
    const settings = await window.FK_DB.getSettings();
    if(settings.waLink)  GROUP_LINK = settings.waLink;
    if(settings.ytLink)  YT         = settings.ytLink;

    /* Site down check */
    if(settings.siteDown){
      const msg = settings.siteDownMsg||"The shop is temporarily closed. Check back later.";
      document.getElementById("site-down-msg").textContent=msg;
      document.getElementById("site-down-overlay").style.display="flex";
      return; /* Don't show the app */
    }

    /* Load products */
    const remoteProducts = await window.FK_DB.getProducts();

  }catch(e){ console.warn("Settings load failed, using defaults",e); }

  /* Show app */
  const app=document.getElementById("app");
  app.style.display="block";

  window.FK_AUTH.onAuth(user=>{

}

      <h3 id="product-modal-title" class="font-display text-xl uppercase italic mb-4">Add Product</h3>
      <div class="flex flex-col gap-3">
        <input id="pm-name"  type="text"   placeholder="Product name"     class="w-full bg-white/[0.04] border border-white/10 rounded-2xl px-4 py-3 text-white text-sm outline-none focus:border-purple-500 transition-all placeholder-white/20">
        <input id="pm-price" type="number" placeholder="Price (AED)"      class="w-full bg-white/[0.04] border border-white/10 rounded-2xl px-4 py-3 text-white text-sm outline-none focus:border-purple-500 transition-all placeholder-white/20">
        <input id="pm-desc"  type="text"   placeholder="Short description" class="w-full bg-white/[0.04] border border-white/10 rounded-2xl px-4 py-3 text-white text-sm outline-none focus:border-purple-500 transition-all placeholder-white/20">
        <input id="pm-img"   type="text"   placeholder="Google Drive thumbnail URL" class="w-full bg-white/[0.04] border border-white/10 rounded-2xl px-4 py-3 text-white text-sm outline-none focus:border-purple-500 transition-all placeholder-white/20">
        <select id="pm-cat" class="w-full bg-white/[0.04] border border-white/10 rounded-2xl px-4 py-3 text-white text-sm outline-none"><option value="boba">🧋 Drinks / Boba</option><option value="snacks">🍟 Snacks</option></select>

  renderProducts("all");

  });

/* ── PRODUCTS ── */
function renderProducts(filter){
  currentFilter=filter;
  const list=filter==="all"?SNACKS:SNACKS.filter(s=>s.category===filter);
  const el=document.getElementById("product-list");if(!el)return;
  el.innerHTML=list.map(s=>{
    const qty=getQty(s.id);
    const isSel=selectedSnack===s.id;
    const imgCls=`snack-shadow${s.isBoba?" boba-adjust":""}${s.isTiger?" tiger-milk-pos":""}`;
    return `<div id="card-${s.id}" class="snack-card rounded-3xl border border-white/8 bg-[#0a0a0a] overflow-hidden${isSel?" selected":""}" onclick="selectSnack(${s.id})">
      <div class="image-container"><img src="${s.img}" class="${imgCls}" alt="${s.name}" loading="lazy"></div>
      <div class="px-4 pb-5">
        <div class="flex items-start justify-between gap-3 mb-1">
          <div><p class="font-black text-base leading-tight">${s.name}</p><p class="text-white/30 text-xs mt-1">${s.desc}</p></div>
          <span class="text-purple-400 font-black text-lg whitespace-nowrap">AED ${s.price}</span>
        </div>
        <div class="flex items-center justify-between mt-3">
          ${qty===0
            ?`<button onclick="event.stopPropagation();addToCart(${s.id})" class="shiny-wrap tap-active px-5 py-2.5 rounded-full text-white font-black text-xs uppercase tracking-wider" style="background:linear-gradient(135deg,#a855f7,#6b21a8)">Add to Bag</button>`
            :`<div class="flex items-center gap-3" onclick="event.stopPropagation()">
               <button onclick="changeQty(${s.id},-1)" class="w-8 h-8 rounded-full bg-white/8 flex items-center justify-center font-black text-base tap-active">−</button>
               <span class="font-black text-base">${qty}</span>
               <button onclick="changeQty(${s.id},1)" class="w-8 h-8 rounded-full flex items-center justify-center font-black text-base tap-active" style="background:linear-gradient(135deg,#a855f7,#6b21a8)">+</button>
             </div><span class="text-white/25 text-xs">AED ${s.price*qty}</span>`}
        </div>
      </div>
    </div>`;
  }).join("");
}
function filterTab(btn,cat){
  document.querySelectorAll(".tab-btn").forEach(b=>{b.classList.remove("active","text-white");b.classList.add("text-white/40");});
  btn.classList.add("active","text-white");btn.classList.remove("text-white/40");
  renderProducts(cat);
}
function selectSnack(id){
  const prev=selectedSnack;
  selectedSnack=selectedSnack===id?null:id;
  if(prev){const c=document.getElementById("card-"+prev);if(c)c.classList.remove("selected");}
  if(selectedSnack){const c=document.getElementById("card-"+selectedSnack);if(c)c.classList.add("selected");}
}

/* ── CART ── */
function getQty(id){const i=cart.find(x=>x.id===id);return i?i.qty:0;}
function cartTotal(){return cart.reduce((s,i)=>s+i.price*i.qty,0);}
function cartCount(){return cart.reduce((s,i)=>s+i.qty,0);}
function addToCart(id){
  const s=SNACKS.find(x=>x.id===id);if(!s)return;
  const e=cart.find(x=>x.id===id);if(e)e.qty++;else cart.push({...s,qty:1});
  saveCart();updateCartUI();updateCardControls(id);showToast(`${s.name} added!`);
}
function changeQty(id,d){
  const i=cart.find(x=>x.id===id);if(!i)return;
  i.qty=Math.max(0,i.qty+d);if(i.qty===0)cart=cart.filter(x=>x.id!==id);
  saveCart();updateCartUI();updateCardControls(id);renderCartItems();
}
function updateCardControls(id){
  const card=document.getElementById("card-"+id);if(!card)return;
  const s=SNACKS.find(x=>x.id===id);if(!s)return;
  const qty=getQty(id);
  const ctrl=card.querySelector(".flex.items-center.justify-between.mt-3");if(!ctrl)return;
  ctrl.innerHTML=qty===0
    ?`<button onclick="event.stopPropagation();addToCart(${id})" class="shiny-wrap tap-active px-5 py-2.5 rounded-full text-white font-black text-xs uppercase tracking-wider" style="background:linear-gradient(135deg,#a855f7,#6b21a8)">Add to Bag</button>`
    :`<div class="flex items-center gap-3" onclick="event.stopPropagation()"><button onclick="changeQty(${id},-1)" class="w-8 h-8 rounded-full bg-white/8 flex items-center justify-center font-black text-base tap-active">−</button><span class="font-black text-base">${qty}</span><button onclick="changeQty(${id},1)" class="w-8 h-8 rounded-full flex items-center justify-center font-black text-base tap-active" style="background:linear-gradient(135deg,#a855f7,#6b21a8)">+</button></div><span class="text-white/25 text-xs">AED ${s.price*qty}</span>`;
}
function saveCart(){localStorage.setItem("fk_cart",JSON.stringify(cart));}
function updateCartUI(){
  const n=cartCount(),t=cartTotal();
  const b=document.getElementById("cart-badge");if(b){b.textContent=n;b.classList.toggle("hidden",n===0);}
  const ct=document.getElementById("cart-total-txt");if(ct)ct.textContent="AED "+t;
  const cc=document.getElementById("cart-count-txt");if(cc)cc.textContent=n+(n===1?" item":" items");
}
function renderCartItems(){
  const el=document.getElementById("cart-items");if(!el)return;
  if(!cart.length){el.innerHTML=`<p class="text-center text-white/20 text-sm py-12">Your bag is empty</p>`;return;}
  el.innerHTML=cart.map(i=>`<div class="flex items-center gap-3 py-3 border-b border-white/5">
    <img src="${i.img}" class="w-12 h-12 rounded-2xl object-contain bg-purple-900/10 border border-white/5" loading="lazy">
    <div class="flex-1 min-w-0"><p class="font-black text-sm truncate">${i.name}</p><p class="text-purple-400 text-xs mt-0.5">AED ${i.price}</p></div>
    <div class="flex items-center gap-2">
      <button onclick="changeQty(${i.id},-1)" class="w-7 h-7 rounded-full bg-white/8 flex items-center justify-center text-sm font-black tap-active">−</button>
      <span class="font-black text-sm w-4 text-center">${i.qty}</span>
      <button onclick="changeQty(${i.id},1)" class="w-7 h-7 rounded-full flex items-center justify-center text-sm font-black tap-active" style="background:linear-gradient(135deg,#a855f7,#6b21a8)">+</button>
    </div>
  </div>`).join("");
}
function openCart(){renderCartItems();document.getElementById("cart-overlay").classList.remove("hidden");setTimeout(()=>document.getElementById("cart-panel").classList.add("open"),10);}
function closeCart(){document.getElementById("cart-panel").classList.remove("open");setTimeout(()=>document.getElementById("cart-overlay").classList.add("hidden"),500);}

/* ── CHECKOUT ── */
function showMain(){document.getElementById("main-view").style.display="block";document.getElementById("checkout-view").style.display="none";}
function goCheckout(){
  if(!cart.length){showToast("Your bag is empty!");return;}
  closeCart();
  document.getElementById("co-summary").innerHTML=cart.map(i=>`<div class="flex justify-between text-sm py-0.5"><span class="text-white/60">${i.name} ×${i.qty}</span><span class="font-bold">AED ${i.price*i.qty}</span></div>`).join("")+`<div class="border-t border-white/10 mt-2 pt-2 flex justify-between"><span class="text-white/40 text-sm">Total</span><span class="font-black text-purple-400">AED ${cartTotal()}</span></div>`;
  document.getElementById("co-total").textContent="AED "+cartTotal();
  document.getElementById("f-date").value=new Date().toISOString().split("T")[0];
  const saved=localStorage.getItem("fk_last_info");
  if(saved)document.getElementById("prefill-banner").classList.remove("hidden");
  document.getElementById("main-view").style.display="none";
  document.getElementById("checkout-view").style.display="block";
  window.scrollTo(0,0);
}
function useSavedInfo(){
  try{
    const info=JSON.parse(localStorage.getItem("fk_last_info")||"{}");
    document.getElementById("f-name").value=info.name||"";
    document.getElementById("f-grade").value=info.grade||"";
    document.getElementById("prefill-banner").classList.add("hidden");
    showToast("Info filled in!");
  }catch(e){}
}
async function placeOrder(){
  const name=(document.getElementById("f-name").value||"").trim();
  const grade=(document.getElementById("f-grade").value||"").trim();
  const date=(document.getElementById("f-date").value||"").trim();
  let ok=true;
  const setE=(id,show)=>{document.getElementById("e-"+id).classList.toggle("hidden",!show);if(show)ok=false;};
  setE("name",!name);setE("grade",!grade);setE("date",!date);
  if(!ok)return;
  const btn=document.getElementById("place-btn");
  btn.disabled=true;btn.innerHTML=`<i class="fas fa-spinner fa-spin mr-2"></i>Placing Order...`;
  localStorage.setItem("fk_last_info",JSON.stringify({name,grade}));
  const orderData={customer:{name,grade,date},items:cart.map(i=>({id:i.id,name:i.name,price:i.price,qty:i.qty})),total:cartTotal(),status:"pending",created:Date.now()};
  try{
    if(!window.FK_DB)await new Promise(r=>{window.addEventListener("fk-ready",r,{once:true});});
    const orderId=await window.FK_DB.saveOrder(orderData);
    const full={...orderData,id:orderId};
    localStorage.setItem("fk_last_order",orderId);
    localStorage.setItem("fk_order_"+orderId,JSON.stringify(full));
    cart=[];saveCart();updateCartUI();
    btn.disabled=false;btn.innerHTML="Place Order";
    openShareModal(full);
  }catch(err){
    console.error(err);btn.disabled=false;btn.innerHTML="Place Order";
    showToast("Order failed — check connection");
  }
}

/* ── SHARE ── */
function receiptUrl(id){return location.origin+location.pathname.replace(/\/[^/]*$/,"/")+`receipt.html?orderId=${id}`;}
function buildMsg(o){
  const items=o.items.map(i=>`  • ${i.name} ×${i.qty}  —  AED ${i.price*i.qty}`).join("\n");
  return `🛍️ *NEW ORDER — Fares King*\n\n🆔 *${o.id}*\n👤 ${o.customer.name}\n🎓 ${o.customer.grade}\n📅 ${o.customer.date}\n\n🛒 Items:\n${items}\n\n💰 *Total: AED ${o.total}*\n\n🧾 Receipt: ${receiptUrl(o.id)}`;
}
function openShareModal(o){
  _pendingOrder=o;
  document.getElementById("share-preview").textContent=buildMsg(o);
  document.getElementById("share-modal").classList.remove("hidden");
  setTimeout(()=>document.getElementById("share-sheet").classList.remove("translate-y-full"),10);
  try{navigator.clipboard.writeText(receiptUrl(o.id));}catch(e){}
}
function closeShareModal(){
  document.getElementById("share-sheet").classList.add("translate-y-full");
  setTimeout(()=>{document.getElementById("share-modal").classList.add("hidden");if(_pendingOrder)location.href="receipt.html?orderId="+_pendingOrder.id;},420);
}
function sendToWhatsApp(){
  if(!_pendingOrder)return;
  window.open("https://wa.me/?text="+encodeURIComponent(buildMsg(_pendingOrder)),"_blank");
  closeShareModal();
}

/* ── LOOKUP ── */
function openOrderLookup(){const last=localStorage.getItem("fk_last_order");if(last)document.getElementById("lookup-inp").value=last;document.getElementById("lookup-modal").classList.remove("hidden");}
function closeLookup(){document.getElementById("lookup-modal").classList.add("hidden");}
function doLookup(){
  const id=(document.getElementById("lookup-inp").value||"").trim();
  const err=document.getElementById("lookup-err");
  if(!id){err.textContent="Please enter an Order ID";err.classList.remove("hidden");return;}
  err.classList.add("hidden");closeLookup();location.href="receipt.html?orderId="+id;
}

/* ── ADMIN AUTH ── */
function openAdminSignin(){
  if(_adminUser&&window.FK_AUTH.isAdmin(_adminUser)){openAdmin();return;}
  document.getElementById("admin-signin").classList.remove("hidden");
  document.getElementById("signin-err").classList.add("hidden");
}
function closeAdminSignin(){document.getElementById("admin-signin").classList.add("hidden");}

async function doAdminSignIn(){
  const err=document.getElementById("signin-err");
  try{
    const user=await window.FK_AUTH.signInGoogle();
    if(!window.FK_AUTH.isAdmin(user)){
      await window.FK_AUTH.signOut();
      err.textContent="Access denied. This account is not authorised.";
      err.classList.remove("hidden");
      return;
    }
    _adminUser=user;
    closeAdminSignin();
    openAdmin();
  }catch(e){
    err.textContent="Sign in failed. Try again.";
    err.classList.remove("hidden");
  }
}

async function doAdminSignOut(){
  await window.FK_AUTH.signOut();
  _adminUser=null;
  closeAdmin();
  showToast("Signed out");
}

/* ── ADMIN PANEL ── */
function openAdmin(){
  const panel=document.getElementById("admin-panel");
  panel.classList.remove("hidden");
  /* Show user info */
  if(_adminUser){
    const av=document.getElementById("admin-avatar");
    if(av&&_adminUser.photoURL){av.src=_adminUser.photoURL;av.style.display="block";}
    const el=document.getElementById("admin-email-label");
    if(el)el.textContent=_adminUser.email;
  }
  adminTab("orders");
  loadAdminOrders();
  loadSettingsIntoUI();
}
function closeAdmin(){document.getElementById("admin-panel").classList.add("hidden");}

function adminTab(name){
  ["orders","products","themes","settings"].forEach(t=>{
    document.getElementById("atab-"+t+"-content").classList.toggle("hidden",t!==name);
    const btn=document.getElementById("atab-"+t);
    if(btn){btn.classList.toggle("text-purple-400",t===name);btn.classList.toggle("border-purple-500",t===name);btn.classList.toggle("text-white/30",t!==name);btn.classList.toggle("border-transparent",t!==name);}
  });
  if(name==="products")renderAdminProducts();
  if(name==="themes")renderThemeList();
}

async function loadAdminOrders(){
  document.getElementById("adm-list").innerHTML=`<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-purple-500 text-xl"></i></div>`;
  try{
    adminOrders=await window.FK_DB.getAllOrders();
    const pend=adminOrders.filter(o=>o.status!=="complete").length;
    const rev=adminOrders.filter(o=>o.status==="complete").reduce((s,o)=>s+(o.total||0),0);
    document.getElementById("adm-total").textContent=adminOrders.length;
    document.getElementById("adm-pend").textContent=pend;
    document.getElementById("adm-rev").textContent="AED "+rev;
    renderAdminList();
  }catch(e){document.getElementById("adm-list").innerHTML=`<p class="text-center text-white/25 text-sm py-8">Failed to load</p>`;}
}
function renderAdminList(){
  const search=(document.getElementById("adm-search").value||"").toLowerCase();
  const filter=document.getElementById("adm-filter").value;
  let list=adminOrders;
  if(filter!=="all")list=list.filter(o=>o.status===filter);
  if(search)list=list.filter(o=>(o.id||"").toLowerCase().includes(search)||(o.customer?.name||"").toLowerCase().includes(search));
  if(!list.length){document.getElementById("adm-list").innerHTML=`<p class="text-center text-white/20 text-sm py-8">No orders found</p>`;return;}
  document.getElementById("adm-list").innerHTML=list.map(o=>{
    const ts=o.created?.seconds?o.created.seconds*1000:(o.created||Date.now());
    const ds=new Date(ts).toLocaleDateString("en-AE",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
    const its=(o.items||[]).map(i=>`${i.name}×${i.qty}`).join(", ");
    return `<div class="rounded-2xl border p-3.5 mb-2.5 ${o.status==="complete"?"border-green-500/20 bg-green-500/[0.02]":"border-white/8 bg-white/[0.015]"}">
      <div class="flex justify-between items-start mb-2">
        <div><p class="text-purple-400 text-[11px] font-black">#${(o.id||"").substring(0,12)}</p><p class="font-black text-sm mt-0.5">${o.customer?.name||"Unknown"}</p></div>
        <div class="text-right"><span class="text-[10px] font-black px-2.5 py-0.5 rounded-full ${o.status==="complete"?"bg-green-500/15 text-green-400 border border-green-500/25":"bg-amber-400/12 text-amber-400 border border-amber-400/25"}">${(o.status||"pending").toUpperCase()}</span><p class="text-white/25 text-[10px] mt-1">${ds}</p></div>
      </div>
      <p class="text-white/35 text-xs">${o.customer?.grade||""} · ${o.customer?.date||""}</p>
      <p class="text-white/20 text-xs mt-0.5 truncate">${its}</p>
      <div class="flex justify-between items-center mt-2.5">
        <span class="text-purple-400 font-black">AED ${o.total||0}</span>
        <div class="flex gap-2">
          ${o.status!=="complete"?`<button onclick="adminDone('${o.id}')" class="bg-green-500/15 border border-green-500/25 rounded-xl px-3 py-1.5 text-green-400 text-xs font-black tap-active">✓ Complete</button>`:`<span class="text-green-400/50 text-xs">✓ Done</span>`}
          <button onclick="adminDeleteOrder('${o.id}')" class="bg-red-500/10 border border-red-500/20 rounded-xl px-2 py-1.5 text-red-400 text-xs tap-active"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    </div>`;
  }).join("");
}
async function adminDone(id){
  await window.FK_DB.markComplete(id);
  const o=adminOrders.find(x=>x.id===id);if(o)o.status="complete";
  document.getElementById("adm-pend").textContent=adminOrders.filter(o=>o.status!=="complete").length;
  renderAdminList();showToast("Marked complete!");
}
async function adminDeleteOrder(id){
  if(!confirm("Delete this order permanently?"))return;
  await window.FK_DB.deleteOrder(id);
  adminOrders=adminOrders.filter(x=>x.id!==id);
  document.getElementById("adm-total").textContent=adminOrders.length;
  document.getElementById("adm-pend").textContent=adminOrders.filter(o=>o.status!=="complete").length;
  renderAdminList();showToast("Order deleted");
}

/* ── ADMIN PRODUCTS ── */
function renderAdminProducts(){
  const el=document.getElementById("adm-products-list");if(!el)return;
  el.innerHTML=SNACKS.map(s=>`<div class="flex items-center gap-3 p-3 rounded-2xl border border-white/8 bg-white/[0.015] mb-2">
    <img src="${s.img}" class="w-12 h-12 rounded-xl object-contain bg-purple-900/10 flex-shrink-0" loading="lazy">
    <div class="flex-1 min-w-0"><p class="font-black text-sm truncate">${s.name}</p><p class="text-purple-400 text-xs">AED ${s.price} · ${s.category}</p></div>
    <div class="flex gap-2">
      <button onclick="openProductModal(${s.id})" class="w-8 h-8 rounded-xl bg-purple-600/20 border border-purple-600/30 flex items-center justify-center text-purple-400 tap-active text-xs"><i class="fas fa-pen"></i></button>
      <button onclick="deleteProduct(${s.id})" class="w-8 h-8 rounded-xl bg-red-500/15 border border-red-500/25 flex items-center justify-center text-red-400 tap-active text-xs"><i class="fas fa-trash"></i></button>
    </div>
  </div>`).join("");
}
let _editingProductId=null;
function openProductModal(id){
  _editingProductId=id;
  const title=document.getElementById("product-modal-title");
  if(id){const s=SNACKS.find(x=>x.id===id);if(!s)return;title.textContent="Edit Product";document.getElementById("pm-name").value=s.name;document.getElementById("pm-price").value=s.price;document.getElementById("pm-desc").value=s.desc;document.getElementById("pm-img").value=s.img;document.getElementById("pm-cat").value=s.category;}
  else{title.textContent="Add Product";["pm-name","pm-price","pm-desc","pm-img"].forEach(i=>document.getElementById(i).value="");document.getElementById("pm-cat").value="snacks";}
  document.getElementById("product-modal").classList.remove("hidden");
  setTimeout(()=>document.getElementById("product-sheet").classList.remove("translate-y-full"),10);
}
function closeProductModal(){
  document.getElementById("product-sheet").classList.add("translate-y-full");
  setTimeout(()=>document.getElementById("product-modal").classList.add("hidden"),400);
}
async function saveProductModal(){
  const name=document.getElementById("pm-name").value.trim();
  const price=parseFloat(document.getElementById("pm-price").value)||0;
  const desc=document.getElementById("pm-desc").value.trim();
  const img=document.getElementById("pm-img").value.trim();
  const cat=document.getElementById("pm-cat").value;
  if(!name||!price||!img){showToast("Fill in all fields");return;}
  if(_editingProductId){const s=SNACKS.find(x=>x.id===_editingProductId);if(s){s.name=name;s.price=price;s.desc=desc;s.img=img;s.category=cat;}}
  else{const newId=Math.max(0,...SNACKS.map(s=>s.id))+1;SNACKS.push({id:newId,name,price,desc,img,category:cat});}
  /* Save to Firestore so all users see updated products */
  try{await window.FK_DB.saveProducts(SNACKS);}catch(e){console.warn("Firestore product save failed",e);}
  closeProductModal();renderAdminProducts();renderProducts(currentFilter);
  showToast(_editingProductId?"Product updated!":"Product added!");
}
async function deleteProduct(id){
  if(!confirm("Remove this product?"))return;
  const idx=SNACKS.findIndex(s=>s.id===id);if(idx>-1)SNACKS.splice(idx,1);
  try{await window.FK_DB.saveProducts(SNACKS);}catch(e){}
  renderAdminProducts();renderProducts(currentFilter);showToast("Product removed");
}

/* ── THEMES ── */
function renderThemeList(){
  document.querySelectorAll(".theme-option").forEach(btn=>{
    const k=btn.dataset.key;
    const check=btn.querySelector(`.theme-check-${k}`);
    if(check)check.style.display=k===currentTheme?"block":"none";
  });
}

/* ── SETTINGS ── */
let _siteDownState=false;
async function loadSettingsIntoUI(){
  try{
    const s=await window.FK_DB.getSettings();
    _siteDownState=!!s.siteDown;
    updateSiteDownToggleUI();
    if(s.siteDownMsg)document.getElementById("site-down-msg-inp").value=s.siteDownMsg;
    if(s.waLink)document.getElementById("wa-link-inp").value=s.waLink;
    if(s.ytLink)document.getElementById("yt-link-inp").value=s.ytLink;
  }catch(e){}
}
function updateSiteDownToggleUI(){
  const toggle=document.getElementById("site-down-toggle");
  const knob=document.getElementById("site-down-knob");
  if(!toggle||!knob)return;
  if(_siteDownState){toggle.style.background="#ef4444";toggle.style.borderColor="#ef4444";knob.style.transform="translateX(24px)";knob.style.background="white";}
  else{toggle.style.background="rgba(255,255,255,.1)";toggle.style.borderColor="rgba(255,255,255,.1)";knob.style.transform="translateX(0)";knob.style.background="rgba(255,255,255,.4)";}
}
function toggleSiteDown(){_siteDownState=!_siteDownState;updateSiteDownToggleUI();}
async function saveSettings(){
  const waLink=(document.getElementById("wa-link-inp").value||"").trim();
  const ytLink=(document.getElementById("yt-link-inp").value||"").trim();
  const siteDownMsg=(document.getElementById("site-down-msg-inp").value||"").trim();
  try{
    await window.FK_DB.saveSettings({siteDown:_siteDownState,siteDownMsg,waLink,ytLink});
    /* Update live links */
    if(waLink){GROUP_LINK=waLink;const wf=document.getElementById("wa-float");if(wf)wf.href=waLink;const wc=document.getElementById("wa-connect-btn");if(wc)wc.href=waLink;}
    if(ytLink){YT=ytLink;const yc=document.getElementById("yt-connect-btn");if(yc)yc.href=ytLink;}
    showToast("Settings saved!");
  }catch(e){showToast("Save failed — check connection");}
}

/* ── TOAST ── */
let _tt;
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove("show"),2200);}
</script>
