/* ── receipt card glow ── */
.receipt-card{
  background:linear-gradient(155deg,rgba(20,8,42,.97),rgba(8,8,22,.99));
  border:1px solid rgba(168,85,247,.22);
  border-radius:24px;
  position:relative;overflow:hidden;
}
.receipt-card::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 20% 10%,rgba(168,85,247,.08) 0%,transparent 55%),
             radial-gradient(circle at 80% 90%,rgba(107,33,168,.06) 0%,transparent 50%);
  pointer-events:none;
}
.divider{height:1px;background:linear-gradient(to right,transparent,rgba(168,85,247,.3),transparent);margin:14px 0;}

/* shimmer skeleton */
.skel{
  background:linear-gradient(90deg,rgba(168,85,247,.05) 25%,rgba(168,85,247,.1) 50%,rgba(168,85,247,.05) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:8px;
}
@keyframes shimmer{to{background-position:-200% 0}}

/* page enter */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease both;}
.fade-up-d1{animation:fadeUp .5s .1s ease both;}
.fade-up-d2{animation:fadeUp .5s .2s ease both;}
.fade-up-d3{animation:fadeUp .5s .3s ease both;}
.fade-up-d4{animation:fadeUp .5s .4s ease both;}

/* success ring pulse */
@keyframes successPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.35)}50%{box-shadow:0 0 0 16px rgba(34,197,94,0)}}
.success-ring{animation:successPulse 2s ease-in-out infinite;}

/* shine sweep on buttons */
@keyframes shine-sweep{0%{transform:translateX(-200%) skewX(-20deg)}100%{transform:translateX(300%) skewX(-20deg)}}
.shiny{position:relative;overflow:hidden;}
.shiny::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.45) 50%,transparent 70%);animation:shine-sweep 2.6s linear infinite;pointer-events:none;}

/* wa pulse */
@keyframes waPulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.4),0 0 0 0 rgba(37,211,102,0)}50%{box-shadow:0 4px 20px rgba(37,211,102,.4),0 0 0 12px rgba(37,211,102,0)}}

.tap-active:active{transform:scale(.96);}

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyC5ak05F3SMU5rhYSbpK0Ybk1nViFwMP6M",
  authDomain:        "fares-f0707.firebaseapp.com",
  projectId:         "fares-f0707",
  storageBucket:     "fares-f0707.firebasestorage.app",
  messagingSenderId: "1067301824307",
  appId:             "1:1067301824307:web:d92582a1371e099f3b8046",
  measurementId:     "G-RQ0QZ0QYXR"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

async function fetchOrder(id) {
  /* Try Firestore first */
  try {
    const snap = await getDoc(doc(db, "orders", id));
    if (snap.exists()) return { id: snap.id, ...snap.data() };
  } catch(e) {
    console.warn("Firestore fetch failed, trying localStorage", e);
  }
  /* Fallback: localStorage cache */
  const raw = localStorage.getItem("fk_order_" + id);
  return raw ? JSON.parse(raw) : null;
}

/* ── Read orderId from URL ── */
const params  = new URLSearchParams(location.search);
const orderId = params.get("orderId") || params.get("order") || "";

if (!orderId) {
  showError("No Order ID found in URL.");
} else {
  fetchOrder(orderId).then(order => {
    if (!order) { showError(`Order "${orderId}" not found.`); return; }
    renderReceipt(order);
  }).catch(e => {
    showError("Failed to load order. Check your connection.");
  });
}

function showError(msg) {
  document.getElementById("loading-state").classList.add("hidden");
  document.getElementById("error-state").classList.remove("hidden");
  document.getElementById("error-msg").textContent = msg;
}

function renderReceipt(o) {
  document.getElementById("loading-state").classList.add("hidden");
  document.getElementById("receipt-state").classList.remove("hidden");

  /* Timestamps */
  const ts  = o.created?.seconds ? o.created.seconds * 1000 : (o.created || Date.now());
  const d   = new Date(ts);
  const dateStr = d.toLocaleDateString("en-AE", { day:"2-digit", month:"short", year:"numeric" });
  const timeStr = d.toLocaleTimeString("en-AE", { hour:"2-digit", minute:"2-digit" });

  /* Header */
  document.getElementById("r-id").textContent     = "#" + o.id;
  document.getElementById("r-id-tip").textContent = o.id;
  document.getElementById("r-date").textContent   = dateStr;
  document.getElementById("r-time").textContent   = timeStr;

  /* Customer */
  document.getElementById("r-name").textContent  = o.customer?.name     || "—";
  document.getElementById("r-phone").textContent = o.customer?.phone    || "—";
  document.getElementById("r-loc").textContent   = o.customer?.location || "—";
  if (o.customer?.notes) {
    document.getElementById("r-notes").textContent = o.customer.notes;
    document.getElementById("r-notes-wrap").classList.remove("hidden");
  }

  /* Items */
  document.getElementById("r-items").innerHTML = (o.items || []).map(i => `
    <div class="flex justify-between items-center py-1.5">
      <span class="text-sm text-white/70">${i.name} <span class="text-white/30">×${i.qty}</span></span>
      <span class="text-sm font-bold">AED ${i.price * i.qty}</span>
    </div>`).join("");

  /* Total */
  document.getElementById("r-total").textContent = "AED " + (o.total || 0);

  /* Status badge */
  const badge = document.getElementById("r-status-badge");
  if (o.status === "complete") {
    badge.textContent = "COMPLETE";
    badge.style.cssText = "background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3);";
  } else {
    badge.textContent = "PENDING";
    badge.style.cssText = "background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.28);";
  }

  /* Store order globally for share functions */
  window._order = o;

  /* Set page title */
  document.title = `Receipt #${o.id} | Fares King`;
}
</script>

<script>
/* ── WhatsApp share ── */
function shareWA() {
  const o = window._order; if (!o) return;
  const url  = location.href;
  const items = (o.items||[]).map(i => `  • ${i.name} ×${i.qty}  —  AED ${i.price*i.qty}`).join("\n");
  const msg  =
    `🛍️ *ORDER — Fares King*\n\n` +
    `🆔 *${o.id}*\n` +
    `👤 ${o.customer?.name||""}\n` +
    `📞 ${o.customer?.phone||""}\n` +
    `📍 ${o.customer?.location||""}\n` +
    (o.customer?.notes ? `📝 "${o.customer.notes}"\n` : "") +
    `\n🛒 Items:\n${items}\n\n` +
    `💰 *Total: AED ${o.total}*\n\n` +
    `🧾 Receipt: ${url}`;
  window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
}

/* ── Copy receipt link ── */
async function copyLink() {
  try {
    await navigator.clipboard.writeText(location.href);
    const btn = document.getElementById("copy-btn");
    btn.innerHTML = `<i class="fas fa-check text-sm"></i> Copied!`;
    btn.style.color = "#22c55e";
    btn.style.borderColor = "rgba(34,197,94,.3)";
    btn.style.background  = "rgba(34,197,94,.08)";
    showToast("Link copied!");
    setTimeout(() => {
      btn.innerHTML = `<i class="fas fa-link text-sm"></i> Copy Receipt Link`;
      btn.style.color = ""; btn.style.borderColor = ""; btn.style.background = "";
    }, 2000);
  } catch(e) {
    showToast("Copy failed — try manually");
  }
}

/* ── Toast ── */
let _tt;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.opacity = "1";
  t.style.transform = "translateX(-50%) translateY(0)";
  clearTimeout(_tt);
  _tt = setTimeout(() => {
    t.style.opacity = "0";
    t.style.transform = "translateX(-50%) translateY(80px)";
  }, 2200);
}
</script>
